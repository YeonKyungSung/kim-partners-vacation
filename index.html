<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연차휴가 관리 시스템</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
/* Design Tokens — shared with admin page */
:root {
  --krds-primary: #4A5D4F;
  --krds-primary-dark: #3B4B3F;
  --krds-primary-deep: #2C3830;
  --krds-primary-light: #E8EDE9;
  --krds-primary-50: #F3F5F3;
  --krds-bg: #F5F2ED;
  --krds-surface: #FDFCFA;
  --krds-white: #FFFFFF;
  --krds-g50: #F8F6F2;
  --krds-g100: #EFECE6;
  --krds-g200: #CDD1D5;
  --krds-g300: #B1B8BE;
  --krds-g400: #8A949E;
  --krds-g500: #6D7882;
  --krds-g600: #58616A;
  --krds-g700: #464C53;
  --krds-g800: #33363D;
  --krds-g900: #1E2124;
  --krds-success: #228738;
  --krds-success-bg: #EAF6EC;
  --krds-warning: #9E6A00;
  --krds-warning-bg: #FFF3DB;
  --krds-warning-base: #FFB114;
  --krds-error: #DE3412;
  --krds-error-bg: #FDEFEC;
  --krds-info: #0B78CB;
  --krds-info-bg: #E7F4FE;
  --krds-font: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --krds-mono: 'D2Coding', 'Consolas', monospace;
  --krds-radius: 4px;
  --krds-radius-md: 6px;
  --krds-radius-lg: 10px;
  --krds-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --krds-shadow-md: 0 4px 12px rgba(0,0,0,.1);
  --krds-shadow-lg: 0 8px 24px rgba(0,0,0,.12);
  --krds-focus: 0 0 0 3px rgba(74,93,79,.12);
  --krds-transition: 150ms ease-in-out;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--krds-font);font-size:15px;font-weight:400;line-height:1.5;color:var(--krds-g900);background:var(--krds-bg);-webkit-font-smoothing:antialiased}

/* Masthead */
.masthead{background:var(--krds-primary-deep);height:36px;display:flex;align-items:center;padding:0 24px;font-size:12px;font-weight:500;color:rgba(255,255,255,.6);letter-spacing:.04em;text-transform:uppercase}
.masthead__inner{max-width:1200px;margin:0 auto;width:100%}

/* Header */
.header{background:var(--krds-primary);padding:0;position:relative;z-index:10}
.header__inner{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
.header__title{font-size:19px;font-weight:700;color:#fff;letter-spacing:-.02em;display:flex;align-items:center}
.header__actions{display:flex;gap:6px;align-items:center}
.header__date{font-size:13px;color:rgba(255,255,255,.8);padding:4px 14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px}
.btn-header{padding:6px 14px;border:1px solid rgba(255,255,255,.3);border-radius:var(--krds-radius);background:rgba(255,255,255,.08);color:rgba(255,255,255,.9);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--krds-transition);font-family:var(--krds-font)}
.btn-header:hover{background:rgba(255,255,255,.18)}

/* Container */
.container{max-width:1200px;margin:0 auto;padding:24px}

/* Info Bar */
.info-bar{display:flex;gap:0;align-items:stretch;flex-wrap:wrap;background:var(--krds-primary-light);border:1px solid var(--krds-g100);border-left:4px solid var(--krds-primary);border-radius:var(--krds-radius-lg);margin-bottom:24px;overflow:hidden}
.info-bar__item{padding:10px 20px;font-size:14px;font-weight:600;color:var(--krds-g700);border-right:1px solid var(--krds-g200);display:flex;align-items:center;gap:6px}
.info-bar__item:last-child{border-right:none}
.info-bar__item strong{color:var(--krds-primary);font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase}

/* Dashboard */
.dash-row{display:grid;grid-template-columns:1fr 300px;gap:24px;margin-bottom:24px}
.dashboard{background:var(--krds-surface);border:1px solid var(--krds-g100);border-radius:var(--krds-radius-lg);overflow:hidden}
.cal-side{background:var(--krds-surface);border:1px solid var(--krds-g100);border-radius:var(--krds-radius-lg);overflow:hidden;display:flex;flex-direction:column}
.cal-side .section__head{border-bottom:2px solid var(--krds-g100);background:var(--krds-g50)}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-nav__label{font-size:15px;font-weight:700;color:var(--krds-g900);min-width:100px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 12px 12px;gap:1px;flex:1;align-content:start}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--krds-g400);padding:4px 0;border-bottom:1px solid var(--krds-g100);margin-bottom:2px}
.cal-dow:first-child{color:var(--krds-g400)}
.cal-dow:last-child{color:var(--krds-primary)}
.cal-cell{text-align:center;padding:1px}
.cal-day{display:flex;align-items:center;justify-content:center;width:30px;height:30px;margin:0 auto;font-size:13px;font-weight:600;color:var(--krds-g500);border-radius:var(--krds-radius)}
.cal-cell:nth-child(7n+1) .cal-day{color:var(--krds-g400)}
.cal-cell:nth-child(7n) .cal-day{color:var(--krds-primary)}
.cal-day--empty{visibility:hidden}
.cal-day--today{background:#C44D3E;color:var(--krds-white)!important;font-weight:700}
.cal-day--holiday{color:#C44D3E!important;background:var(--krds-error-bg)}
.cal-day--used{background:var(--krds-primary);color:var(--krds-white)!important;font-weight:600}
.cal-day--used.cal-day--today{box-shadow:0 0 0 2px var(--krds-primary)}
.cal-day--half{background:var(--krds-primary-light);color:var(--krds-primary)!important;font-weight:600}
.cal-legend{display:flex;gap:12px;justify-content:center;padding:6px 12px 10px;font-size:11px;color:var(--krds-g400);font-weight:500;border-top:1px solid var(--krds-g100)}
.cal-legend__dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:3px;vertical-align:middle}
.cal-legend__dot--used{background:var(--krds-primary)}
.cal-legend__dot--half{background:var(--krds-primary-light);border:1px solid #CDD6CE}
.cal-legend__dot--today{background:#C44D3E}
.dash-top{display:flex;align-items:center;gap:32px;padding:28px 32px;background:linear-gradient(135deg,var(--krds-primary-50) 0%,var(--krds-white) 100%);border-bottom:1px solid var(--krds-g100)}
.gauge{position:relative;flex-shrink:0}
.gauge svg{display:block}
.gauge__center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge__number{font-size:40px;font-weight:900;color:var(--krds-g900);line-height:1;letter-spacing:-.03em}
.gauge__unit{font-size:13px;color:var(--krds-g500);margin-top:4px;font-weight:600}
.dash-summary{flex:1}
.dash-summary__title{font-size:15px;font-weight:700;color:var(--krds-g900);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--krds-primary)}
.dash-summary__row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px}
.dash-summary__label{color:var(--krds-g500);font-weight:400}
.dash-summary__val{font-weight:700;font-size:16px}
.dash-summary__val--primary{color:var(--krds-primary)}
.dash-summary__val--error{color:var(--krds-error)}
.dash-summary__val--success{color:var(--krds-primary)}
.dash-section{padding:6px 0;border-bottom:1px solid var(--krds-g100)}
.dash-section:last-child{border-bottom:none}
.dash-section__head{font-size:11px;font-weight:700;color:var(--krds-g400);margin-bottom:2px;letter-spacing:.04em}
.dash-total{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;margin-top:8px;background:var(--krds-primary-50);border-radius:8px;border:1.5px solid var(--krds-primary)}
.dash-total__label{font-size:15px;font-weight:700;color:var(--krds-g700)}
.dash-total__val{font-size:24px;font-weight:900;color:var(--krds-primary)}
.dash-bottom{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}
.dash-mini{padding:12px 16px;text-align:center;border-right:1px solid var(--krds-g100);background:var(--krds-g50)}
.dash-mini:last-child{border-right:none}
.dash-mini__label{font-size:11px;color:var(--krds-g400);font-weight:700;margin-bottom:3px;letter-spacing:.04em;text-transform:uppercase}
.dash-mini__val{font-size:17px;font-weight:700;color:var(--krds-g800)}

/* Section */
.section{background:var(--krds-surface);border:1px solid var(--krds-g100);border-radius:var(--krds-radius-lg);margin-bottom:24px;overflow:hidden}
.section__head{padding:12px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--krds-g50);border-bottom:2px solid var(--krds-g100)}
.section__title{font-size:15px;font-weight:700;color:var(--krds-g900);display:flex;align-items:center;gap:8px}
.section__title::before{content:'';display:block;width:3px;height:16px;background:var(--krds-primary);border-radius:2px}
.section__meta{font-size:13px;color:var(--krds-g400);font-weight:400}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th,.tbl thead th{background:var(--krds-g50);color:var(--krds-g700);font-size:13px;font-weight:700;padding:12px 16px;text-align:center;white-space:nowrap;border-bottom:2px solid var(--krds-g200)}
.tbl td,.tbl tbody td{padding:12px 16px;text-align:center;border-bottom:1px solid var(--krds-g100);font-size:13px;color:var(--krds-g800)}
.tbl tr:hover td,.tbl tbody tr:hover td{background:var(--krds-primary-50)}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl .text-left{text-align:left}
.tbl tbody tr.future td{color:var(--krds-g300)}
.tbl tbody tr.future:hover td{background:var(--krds-g50)}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:var(--krds-radius);font-size:11px;font-weight:700}
.badge--ok{background:var(--krds-success-bg);color:var(--krds-success);border:1px solid #C0D9C4}
.badge--warn{background:var(--krds-warning-bg);color:var(--krds-warning);border:1px solid #E8D9A8}
.badge--danger{background:var(--krds-error-bg);color:var(--krds-error);border:1px solid #F5C4BA}
.badge--accrual{background:#D4E8D6;color:#2C5F30;border:1px solid #A8CDA9}
.badge--used{background:var(--krds-primary);color:#fff;border:1px solid var(--krds-primary-dark)}
.badge--half{background:var(--krds-primary-light);color:var(--krds-primary);border:1px solid #C0D4C2}
.badge--grant{background:var(--krds-primary-light);color:var(--krds-primary-dark);border:1px solid #CDD6CE}
.badge--pending{background:#FFF3D6;color:#8B6B1F;border:1px solid #E0CFA0}
.badge--carryover{background:#EDE8F5;color:#6B5B95;border:1px solid #C5BBD9}
.badge--birthday{background:var(--krds-warning-bg);color:var(--krds-warning);border:1px solid #E8D9A8}.val-plus{color:var(--krds-primary);font-weight:700}
.val-minus{color:var(--krds-error);font-weight:700}
.val-balance{color:var(--krds-g900);font-weight:700}
.empty-row td{color:var(--krds-g400);font-style:italic;padding:20px!important}

/* Form */
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 20px;background:var(--krds-g50);border-bottom:1px solid var(--krds-g100)}
.input,.select{padding:8px 12px;border:1px solid var(--krds-g200);border-radius:var(--krds-radius-md);font-size:15px;font-family:var(--krds-font);color:var(--krds-g900);background:var(--krds-white);transition:border-color var(--krds-transition)}
.input:focus,.select:focus{outline:none;border-color:var(--krds-primary);box-shadow:var(--krds-focus)}

/* Buttons */
.btn{padding:8px 16px;border:none;border-radius:var(--krds-radius-md);font-family:var(--krds-font);font-size:13px;font-weight:700;cursor:pointer;transition:all var(--krds-transition);display:inline-flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap}
.btn:focus-visible{outline:none;box-shadow:var(--krds-focus)}
.btn--primary{background:var(--krds-primary);color:#fff}
.btn--primary:hover{background:var(--krds-primary-dark)}
.btn--secondary{background:var(--krds-g50);color:var(--krds-g700);border:1px solid var(--krds-g200)}
.btn--secondary:hover{background:var(--krds-g100)}
.btn--danger{background:var(--krds-error-bg);color:var(--krds-error);border:1px solid #E0C8C8}
.btn--danger:hover{background:#ECD9D9}
.btn--sm{padding:5px 12px;font-size:12px}
.btn--export{background:var(--krds-primary-light);color:var(--krds-primary);border:1px solid #C0D4C2}
.btn--export:hover{background:#D8E6DA}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1300;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--krds-white);border-radius:var(--krds-radius-lg);width:90%;max-width:440px;box-shadow:var(--krds-shadow-lg);overflow:hidden;border:1px solid var(--krds-g100)}
.modal__head{padding:16px 20px;background:var(--krds-primary);color:var(--krds-white)}
.modal__head h3{font-size:18px;font-weight:700}
.modal__body{padding:20px}
.modal__foot{padding:12px 20px;border-top:1px solid var(--krds-g100);display:flex;gap:6px;justify-content:flex-end;background:var(--krds-g50)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--krds-g700);margin-bottom:4px}
.form-group .input,.form-group .select{width:100%}
.theme-row{display:flex;gap:12px;flex-wrap:wrap;padding:8px 0}

/* Upload */
.upload-area{padding:16px 20px;background:var(--krds-g50);border-bottom:1px solid var(--krds-g100);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.upload-area__info{font-size:13px;color:var(--krds-g400);flex:1;min-width:200px}
.upload-area__info code{background:var(--krds-g100);padding:1px 6px;border-radius:3px;font-size:12px;font-family:var(--krds-mono)}
.file-input-wrap{position:relative;overflow:hidden;display:inline-block}
.file-input-wrap input[type=file]{position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer}

/* Footer */
.footer{text-align:center;padding:16px;font-size:13px;color:var(--krds-g400);border-top:1px solid var(--krds-g100);margin-top:8px}

/* Collapsible */
.section__toggle{cursor:pointer;user-select:none}
.section__toggle:hover{background:var(--krds-g50)}
.section__arrow{font-size:14px;color:var(--krds-g400);transition:transform 200ms}
.section--collapsed .section__arrow{transform:rotate(-90deg)}
.section--collapsed .section__body{display:none}

/* Theme swatches */
.swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 150ms;position:relative}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:var(--krds-g800);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--krds-g800)}
.swatch__label{font-size:10px;text-align:center;margin-top:2px;color:var(--krds-g500)}

/* Print */
@media print{
  body{background:#fff;font-size:11px}
  .masthead{background:#222;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .header{background:var(--krds-primary);-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .tbl th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .btn,.form-row,.modal-overlay,.no-print{display:none!important}
  .section,.dashboard{break-inside:avoid}
  .container{max-width:100%;padding:0 10px}
  .gauge__number{font-size:20px}
}

/* Responsive */
@media(max-width:1024px){.dash-row{grid-template-columns:1fr}}
@media(max-width:768px){
  .container{padding:16px}
  .dash-top{flex-direction:column;gap:16px;padding:20px;text-align:center}
  .dash-bottom{grid-template-columns:repeat(auto-fit,minmax(80px,1fr))}
  .dash-mini{border-bottom:1px solid var(--krds-g100)}
  .header__inner{flex-direction:column;gap:8px}
  .form-row{flex-direction:column}
  .form-row .input,.form-row .select,.form-row .btn{width:100%}
  .info-bar{flex-direction:column}
  .info-bar__item{border-right:none;border-bottom:1px solid var(--krds-g100);padding:8px 16px}
  .info-bar__item:last-child{border-bottom:none}
  .tbl th,.tbl td{padding:7px 8px;font-size:13px}
  .masthead{padding:0 12px;font-size:12px}
}
@media(min-width:769px) and (max-width:1023px){
  .dash-row{grid-template-columns:1fr 280px}
  .dash-bottom{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}
}
</style>
</head>

      <span class="header__date" id="todayBadge"></span>
      <button class="btn-header" onclick="exportCSV()">CSV 내보내기</button>
      <button class="btn-header" onclick="window.print()">인쇄</button>
      <button class="btn-header" onclick="openSettings()">설정</button>

</header>

<main class="container">
  <div class="info-bar" id="employeeBar"></div>
  <div class="dash-row">
    <div class="dashboard" id="dashboard"></div>
    <div class="cal-side">
      <div class="section__head">
        <h2 class="section__title">달력</h2>
        <div class="cal-nav">
          <button class="btn btn--secondary btn--sm" onclick="calMove(-1)">&larr;</button>
          <span class="cal-nav__label" id="calLabel"></span>
          <button class="btn btn--secondary btn--sm" onclick="calMove(1)">&rarr;</button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-legend">
        <span><span class="cal-legend__dot cal-legend__dot--used"></span>연차</span>
        <span><span class="cal-legend__dot cal-legend__dot--half"></span>반차</span>
        <span><span class="cal-legend__dot cal-legend__dot--today"></span>오늘</span>
        <span><span class="cal-legend__dot" style="background:var(--krds-error-bg);border:1px solid #F5C4BA"></span>공휴일</span>
      </div>

async function fetchUsedFromDB(name){
  try{const data=await sbGet('vacation_entries','select=date,type&employee_name=eq.'+encodeURIComponent(name)+'&order=date');return Array.isArray(data)?data:[]}
  catch(e){console.error(e);return []}
}
function load(k,d){try{const v=localStorage.getItem(k);if(!v)return structuredClone(d);const o=JSON.parse(v);if(k===KEYS.settings&&o.dept==='개발팀'){o.dept='마케팅';save(k,o)}return o}catch{return structuredClone(d)}}
function save(k,v){
  localStorage.setItem(k,JSON.stringify(v));
  // 사용 내역이면 admin 쪽에도 동기화
  if(LINK_MODE && k===KEYS.used){
    try{
      const adminKey='vac_admin_employees';
      const raw=localStorage.getItem(adminKey);
      if(raw){
        const list=JSON.parse(raw);
        const emp=list.find(e=>e.name===LINK_DATA.name);
        if(emp) localStorage.setItem('vac_admin_'+emp.id,JSON.stringify(v));
      }
    }catch(e){}
  }
}
function toDate(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fmt(d){return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')}
function fmtISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dayVal(i){return i.type==='오전반차'||i.type==='오후반차'?0.5:1}
function isBirthdayLeave(i){return i.type==='생일연차'}
function isSpecialLeave(i){return i.type==='생일연차'}
function getToday(){const d=new Date();d.setHours(0,0,0,0);return d}
function getAnnualDays(y){if(y<2)return 0;return Math.min(15+Math.floor((y-2)/2),25)}
function numFmt(n){return n%1===0?String(n):n.toFixed(1)}

/* ═══════════════════════════════════════════════
   Theme system
   ═══════════════════════════════════════════════ */
const THEMES={
  sage:{label:'그린',swatch:'#4A5D4F',primary:'#4A5D4F',dark:'#3B4B3F',deep:'#2C3830',light:'#E8EDE9',p50:'#F3F5F3',bg:'#F5F2ED',surface:'#FDFCFA',g50:'#F8F6F2',g100:'#EFECE6',g200:'#E0DCD4',success:'#228738',warning:'#9E6A00',error:'#DE3412',gauge:'#4A5D4F',gaugeWarn:'#9E6A00',gaugeDanger:'#DE3412',focus:'rgba(74,93,79,.12)',badge:'#CDD6CE'},
  navy:{label:'네이비',swatch:'#3D5A80',primary:'#3D5A80',dark:'#2F4A6C',deep:'#233A54',light:'#E4ECF4',p50:'#F1F5F9',bg:'#EEF1F5',surface:'#F9FBFD',g50:'#F4F6F9',g100:'#E9ECF1',g200:'#D8DDE6',success:'#228738',warning:'#9E6A00',error:'#DE3412',gauge:'#3D5A80',gaugeWarn:'#9E6A00',gaugeDanger:'#DE3412',focus:'rgba(61,90,128,.12)',badge:'#B8C8D8'},
};
let selectedTheme='sage';

function applyTheme(id){
  const t=THEMES[id];if(!t)return;
  const r=document.documentElement.style;
  r.setProperty('--krds-primary',t.primary);
  r.setProperty('--krds-primary-dark',t.dark);
  r.setProperty('--krds-primary-deep',t.deep);
  r.setProperty('--krds-primary-light',t.light);
  r.setProperty('--krds-primary-50',t.p50);
  r.setProperty('--krds-bg',t.bg);
  r.setProperty('--krds-surface',t.surface);
  r.setProperty('--krds-g50',t.g50);
  r.setProperty('--krds-g100',t.g100);
  r.setProperty('--krds-g200',t.g200);
  r.setProperty('--krds-success',t.success);
  r.setProperty('--krds-success-bg',t.light);
  r.setProperty('--krds-warning',t.warning);
  r.setProperty('--krds-error',t.error);
  r.setProperty('--krds-info',t.primary);
  r.setProperty('--krds-info-bg',t.light);
  r.setProperty('--krds-amber',t.warning);
  r.setProperty('--krds-focus',t.focus);
  selectedTheme=id;
}

function renderSwatches(){
  const el=document.getElementById('themeSwatches');
  el.innerHTML=Object.entries(THEMES).map(([id,t])=>`<div style="text-align:center"><div class="swatch${selectedTheme===id?' active':''}" style="background:${t.swatch}" onclick="previewTheme('${id}')" title="${t.label}"></div><div class="swatch__label">${t.label}</div></div>`).join('');
}

function previewTheme(id){
  applyTheme(id);
  renderSwatches();
  render().catch(console.error);
}

function toggleSection(id){
  document.getElementById(id).classList.toggle('section--collapsed');
}

function openSettings(){
  const s=load(KEYS.settings,DEFAULT_SETTINGS);
  document.getElementById('setName').value=s.name;
  document.getElementById('setDept').value=s.dept;
  document.getElementById('setHireDate').value=s.hireDate;
  document.getElementById('setBirthday').value=s.birthday||'';
  selectedTheme=s.theme||'sage';
  renderSwatches();
  if(LINK_MODE){
    document.getElementById('setName').disabled=true;
    document.getElementById('setDept').disabled=true;
    document.getElementById('setHireDate').disabled=true;
    document.getElementById('setBirthday').disabled=true;
  }
  document.getElementById('settingsModal').classList.add('active');
}
function closeSettings(){document.getElementById('settingsModal').classList.remove('active')}
function saveSettings(){
  const s={name:document.getElementById('setName').value.trim(),dept:document.getElementById('setDept').value.trim(),hireDate:document.getElementById('setHireDate').value,birthday:document.getElementById('setBirthday').value.trim(),theme:selectedTheme};
  if(!s.hireDate){alert('입사일을 입력하세요.');return}
  save(KEYS.settings,s);
  // admin 페이지 직원 목록과 연동
  syncToAdmin(s);
  closeSettings();render().catch(console.error);
}
function syncToAdmin(s){
  try{
    const adminKey='vac_admin_employees';
    const raw=localStorage.getItem(adminKey);
    if(!raw)return;
    const list=JSON.parse(raw);
    const idx=list.findIndex(e=>e.name===s.name);
    if(idx>=0){
      list[idx].hireDate=s.hireDate;
      list[idx].birthday=s.birthday||'';
      list[idx].dept=s.dept;
      localStorage.setItem(adminKey,JSON.stringify(list));
    }
  }catch(e){}
}
function resetAllData(){
  if(!confirm('모든 데이터를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.'))return;
  localStorage.removeItem(KEYS.settings);localStorage.removeItem(KEYS.used);closeSettings();render().catch(console.error);
}

async function addVacation(){
  const dateVal=document.getElementById('inputDate').value;
  const typeVal=document.getElementById('inputType').value;
  if(!dateVal){alert('날짜를 선택하세요.');return}
  // 주말/공휴일 경고
  const _hName=isHoliday(dateVal);
  if(isWeekend(dateVal)){
    if(!confirm(dateVal+' 은(는) 주말입니다.\n그래도 등록하시겠습니까?'))return;
  }else if(_hName){
    if(!confirm(dateVal+' 은(는) '+_hName+' (법정공휴일)입니다.\n그래도 등록하시겠습니까?'))return;
  }
  if(typeVal==='생일연차'){
    const st=load(KEYS.settings,DEFAULT_SETTINGS);
    const hd=toDate(st.hireDate),dd=Math.floor((new Date()-hd)/86400000);
    if(dd<90){alert('수습기간(입사 3개월 미만)에는 생일연차를 사용할 수 없습니다.');return}
    if(!st.birthday){alert('설정에서 생일(월/일)을 먼저 입력하세요.');return}
    const bMonth=parseInt(st.birthday.split('-')[0],10);
    const selMonth=parseInt(dateVal.split('-')[1],10);
    if(bMonth!==selMonth){alert('생일연차는 생일 당월('+bMonth+'월)에만 사용할 수 있습니다.');return}
    const used0=LINK_MODE?await fetchUsedFromDB(LINK_DATA.name):load(KEYS.used,DEFAULT_USED);
    const selYear=dateVal.split('-')[0];
    if(used0.some(u=>u.type==='생일연차'&&u.date.startsWith(selYear))){alert(selYear+'년 생일연차는 이미 사용했습니다.');return}
    alert('📌 생일 휴가 등록 안내\n\n1. 휴가 대장 스프레드에 기재해주세요.\n   예) '+st.name+'(생일 휴가)\n\n2. 네이버 웍스에도 기재해주세요.\n   예) '+st.name+'(생일 휴가)\n\n※ 생일 당월 미사용 시 소멸됩니다.');
  }
  const used=LINK_MODE?await fetchUsedFromDB(LINK_DATA.name):load(KEYS.used,DEFAULT_USED);
  if(used.find(u=>u.date===dateVal&&u.type===typeVal)){alert('이미 등록된 내역입니다.');return}
  if(typeVal==='연차'&&used.some(u=>u.date===dateVal)){
    if(!confirm(dateVal+'에 이미 반차가 등록되어 있습니다. 연차로 덮어쓰시겠습니까?'))return;
    if(LINK_MODE){
      await sbDelete('vacation_entries','employee_name=eq.'+encodeURIComponent(LINK_DATA.name)+'&date=eq.'+dateVal);
      const r1=await sbInsert('vacation_entries',{employee_name:LINK_DATA.name,date:dateVal,type:typeVal});
      if(!r1.ok){alert('저장 실패');return}
    }else{
      const f=used.filter(u=>u.date!==dateVal);f.push({date:dateVal,type:typeVal});f.sort((a,b)=>a.date.localeCompare(b.date));save(KEYS.used,f);
    }
  }else{
    if(LINK_MODE){
      const r2=await sbInsert('vacation_entries',{employee_name:LINK_DATA.name,date:dateVal,type:typeVal});
      if(!r2.ok){alert('저장 실패');return}
    }else{
      used.push({date:dateVal,type:typeVal});used.sort((a,b)=>a.date.localeCompare(b.date));save(KEYS.used,used);
    }
  }
  document.getElementById('inputDate').value='';await render();
}
async function removeVacation(date,type){
  if(!confirm(date+' '+type+'을(를) 삭제하시겠습니까?'))return;
  if(LINK_MODE){
    await sbDelete('vacation_entries','employee_name=eq.'+encodeURIComponent(LINK_DATA.name)+'&date=eq.'+date+'&type=eq.'+encodeURIComponent(type));
  }else{
    save(KEYS.used,load(KEYS.used,DEFAULT_USED).filter(u=>!(u.date===date&&u.type===type)));
  }
  await render();
}

async function exportCSV(){
  const s=load(KEYS.settings,DEFAULT_SETTINGS),used=LINK_MODE?await fetchUsedFromDB(LINK_DATA.name):load(KEYS.used,DEFAULT_USED);
  let csv='\uFEFF성명,부서,입사일\n'+`${s.name},${s.dept},${s.hireDate}\n\n날짜,구분,차감일수\n`;
  used.forEach(u=>{const label=u.type==='생일연차'?s.name+'(생일 휴가)':u.type;csv+=`${u.date},${label},${u.type==='생일연차'?'별도':dayVal(u)}\n`});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`연차사용내역_${s.name||'export'}_${fmtISO(getToday())}.csv`;a.click();
}

async function render(){
  const settings=load(KEYS.settings,DEFAULT_SETTINGS);
  const used=LINK_MODE?await fetchUsedFromDB(LINK_DATA.name):load(KEYS.used,DEFAULT_USED);
  const today=getToday(),hireDate=toDate(settings.hireDate);
  document.getElementById('todayBadge').textContent=fmt(today)+' 기준';

  const info=[];
  if(settings.name)info.push(`<div class="info-bar__item"><strong>성명</strong>${settings.name}</div>`);
  if(settings.dept)info.push(`<div class="info-bar__item"><strong>부서</strong>${settings.dept}</div>`);
  info.push(`<div class="info-bar__item"><strong>입사일</strong>${fmt(hireDate)}</div>`);
  if(settings.birthday)info.push(`<div class="info-bar__item"><strong>생일</strong>${settings.birthday.replace('-','월 ')}일</div>`);
  const dd=Math.floor((today-hireDate)/86400000),dY=Math.floor(dd/365),dM=Math.floor((dd%365)/30);
  info.push(`<div class="info-bar__item"><strong>근속</strong>${dY>0?dY+'년 ':''}${dM}개월 (${dY>0?dY+'년 이상':'1년 미만'})</div>`);
  document.getElementById('employeeBar').innerHTML=info.join('');

  const dayBefore=d=>new Date(d-86400000);

  // 동적 년차 경계
  const yearEnds=[];
  for(let i=1;i<=30;i++){const d=new Date(hireDate);d.setFullYear(d.getFullYear()+i);yearEnds.push(d)}
  let curYi=0;
  for(let i=0;i<yearEnds.length;i++){if(today<yearEnds[i]){curYi=i;break}}
  const yi=curYi+1;
  const curStart=curYi===0?hireDate:yearEnds[curYi-1];
  const curEnd=yearEnds[curYi];

  const regularUsed=used.filter(u=>!isSpecialLeave(u));
  const birthdayUsed=used.filter(u=>isBirthdayLeave(u));
  const totalUsedDays=regularUsed.reduce((s,u)=>s+dayVal(u),0);
  const totalBirthdayDays=birthdayUsed.length;
  document.getElementById('usedCount').textContent=`연차 ${numFmt(totalUsedDays)}일` + (totalBirthdayDays>0?` + 생일연차 ${totalBirthdayDays}일`:'') + ' 사용';

  // 올해(1/1~) 사용분만 기본 표시
  const thisJan1=new Date(today.getFullYear(),0,1);
  const curYearUsedList=used.filter(u=>toDate(u.date)>=thisJan1);
  const prevYearUsedList=used.filter(u=>toDate(u.date)<thisJan1);
  const renderRow=(u,i)=>{const isHalf=u.type==='오전반차'||u.type==='오후반차';const bc=u.type==='생일연차'?'badge--birthday':isHalf?'badge--half':'badge--used';const label=u.type==='생일연차'&&settings.name?settings.name+'(생일 휴가)':u.type;return `<tr><td>${i+1}</td><td>${u.date}</td><td><span class="badge ${bc}">${label}</span></td><td class="no-print"><button class="btn btn--danger btn--sm" onclick="removeVacation('${u.date}','${u.type}')">삭제</button></td></tr>`};
  if(used.length===0){
    document.getElementById('usedList').innerHTML='<tr class="empty-row"><td colspan="4">등록된 사용 내역이 없습니다.</td></tr>';
  }else{
    let html='';
    if(prevYearUsedList.length>0){
      html+=`<tr class="no-print"><td colspan="4" style="text-align:center;padding:8px"><button class="btn btn--secondary btn--sm" onclick="document.querySelectorAll('.prev-year-row').forEach(r=>r.style.display=r.style.display==='none'?'':'none');this.textContent=this.textContent.includes('보기')?'이전 내역 숨기기':'이전 내역 보기 (${prevYearUsedList.length}건)'">이전 내역 보기 (${prevYearUsedList.length}건)</button></td></tr>`;
      html+=prevYearUsedList.map((u,i)=>{const isHalf=u.type==='오전반차'||u.type==='오후반차';const bc=u.type==='생일연차'?'badge--birthday':isHalf?'badge--half':'badge--used';const label=u.type==='생일연차'&&settings.name?settings.name+'(생일 휴가)':u.type;return `<tr class="prev-year-row" style="display:none"><td>${i+1}</td><td>${u.date}</td><td><span class="badge ${bc}">${label}</span></td><td class="no-print"><button class="btn btn--danger btn--sm" onclick="removeVacation('${u.date}','${u.type}')">삭제</button></td></tr>`}).join('');
    }
    html+=curYearUsedList.map((u,i)=>renderRow(u,prevYearUsedList.length+i+1)).join('');
    document.getElementById('usedList').innerHTML=html;
  }

  // 이월 체인 계산 (24년도 연차발생일 기준 미사용분부터 이월, 유예기간: 연차종료일 + 3개월)
  const CARRYOVER_FROM=2024; // 본인 연차발생일이 2024년 이후인 연차부터 이월 적용
  const GRACE_MONTHS=3;
  const y1End=yearEnds[0];
  let carryover=0,carryoverExpiry=null,carryoverUsed=0,carryoverExpired=0;
  const y1Used=regularUsed.filter(u=>{const d=toDate(u.date);return d>=hireDate&&d<y1End}).reduce((s,u)=>s+dayVal(u),0);
  if(hireDate.getFullYear()>=CARRYOVER_FROM){
    carryover=Math.max(0,11-y1Used);
    carryoverExpiry=new Date(y1End);carryoverExpiry.setMonth(carryoverExpiry.getMonth()+GRACE_MONTHS);
  }
  for(let y=2;y<yi;y++){
    const s=yearEnds[y-2],e=yearEnds[y-1];
    const days=getAnnualDays(y);
    // 유예기간 내 사용분으로 이월 소진
    if(carryover>0&&carryoverExpiry){
      const graceEnd=carryoverExpiry<e?carryoverExpiry:e;
      const usedInGrace=regularUsed.filter(u=>{const d=toDate(u.date);return d>=s&&d<graceEnd}).reduce((s,u)=>s+dayVal(u),0);
      carryoverUsed=Math.min(carryover,usedInGrace);
      carryoverExpired=carryover-carryoverUsed;
    }else{carryoverUsed=0;carryoverExpired=0}
    const yu=regularUsed.filter(u=>{const d=toDate(u.date);return d>=s&&d<e}).reduce((s,u)=>s+dayVal(u),0);
    // 다음 연도 이월: 본인 연차발생일이 2024년 이후일 때만
    const thisYearNetUsed=yu-carryoverUsed;
    if(s.getFullYear()>=CARRYOVER_FROM){
      carryover=Math.max(0,days-thisYearNetUsed);
      carryoverExpiry=new Date(e);carryoverExpiry.setMonth(carryoverExpiry.getMonth()+GRACE_MONTHS);
    }else{carryover=0;carryoverExpiry=null}
  }

  // 현재 년차 섹션 렌더링
  document.getElementById('currentYearPeriod').textContent=fmt(curStart)+' ~ '+fmt(dayBefore(curEnd));
  var curCarryoverUsed=0,curCarryoverExpired=0,effectiveCarryover=0;
  if(yi===1){
    document.getElementById('currentYearTitle').textContent='1년 미만 월차 발생 / 사용 내역';
    const y1All=[];
    for(let m=1;m<=11;m++){const d=new Date(hireDate);d.setMonth(d.getMonth()+m);y1All.push({date:d,type:'accrual',label:m+'개월 만근',delta:1})}
    regularUsed.forEach(u=>{const ud=toDate(u.date);if(ud>=hireDate&&ud<y1End)y1All.push({date:ud,type:'used',label:u.type,delta:-dayVal(u)})});
    y1All.sort((a,b)=>a.date-b.date||(a.type==='accrual'?-1:1));
    let bal=0;
    document.getElementById('currentYearDetail').innerHTML=y1All.map(e=>{
      bal+=e.delta;const f=e.date>today,c=f?' class="future"':'';
      if(e.type==='accrual'){const b=f?'badge--pending':'badge--accrual',t=f?'발생예정':'발생';
      return `<tr${c}><td>${fmt(e.date)}</td><td><span class="badge ${b}">${t}</span></td><td class="text-left">${e.label}</td><td class="val-plus">+1</td><td>-</td><td class="val-balance">${numFmt(bal)}</td></tr>`}
      return `<tr${c}><td>${fmt(e.date)}</td><td><span class="badge badge--used">사용</span></td><td class="text-left">${e.label}</td><td>-</td><td class="val-minus">-${numFmt(Math.abs(e.delta))}</td><td class="val-balance">${numFmt(bal)}</td></tr>`;
    }).join('');
    var y1Accrued=y1All.filter(e=>e.type==='accrual'&&e.date<=today).length;
    var curDashUsed=y1Used,curDashTotal=11,curDashRemaining=y1Accrued-y1Used,isY1=true,curAccrued=y1Accrued;
  }else{
    document.getElementById('currentYearTitle').textContent=dY+'년 이상 연차 발생 / 사용 내역';
    const days=getAnnualDays(yi);
    // 현재 년차의 이월 유예기간 계산
    let curGraceEnd=null;
    if(carryover>0&&carryoverExpiry){
      curGraceEnd=carryoverExpiry<curEnd?carryoverExpiry:curEnd;
      const usedInGrace=regularUsed.filter(u=>{const d=toDate(u.date);return d>=curStart&&d<curGraceEnd}).reduce((s,u)=>s+dayVal(u),0);
      curCarryoverUsed=Math.min(carryover,usedInGrace);
      // 유예기간이 아직 안 지났으면 소멸 없음
      if(today>=carryoverExpiry){curCarryoverExpired=carryover-curCarryoverUsed}
      else{curCarryoverExpired=0}
    }
    effectiveCarryover=carryover-curCarryoverExpired;
    const totalWithCarry=days+effectiveCarryover;
    const evts=[];
    evts.push({date:new Date(curStart),type:'carryover',label:'전년도 이월 '+numFmt(carryover)+'일'+(carryoverExpiry?' (종료일: '+fmt(dayBefore(carryoverExpiry))+')':''),delta:carryover});
    evts.push({date:new Date(curStart),type:'grant',label:dY+'년 이상 연차 '+days+'일 부여',delta:days});
    // 이월 소멸 이벤트 (유예기간 만료 시)
    if(curCarryoverExpired>0&&carryoverExpiry){
      evts.push({date:new Date(carryoverExpiry),type:'expired',label:'이월 미사용분 소멸 (유예기간 만료)',delta:-curCarryoverExpired});
    }
    regularUsed.forEach(u=>{const ud=toDate(u.date);if(ud>=curStart&&ud<curEnd)evts.push({date:ud,type:'used',label:u.type,delta:-dayVal(u)})});
    evts.sort((a,b)=>a.date-b.date||(a.type==='carryover'?-2:a.type==='grant'?-1:a.type==='expired'?2:1));
    let bal=0;
    document.getElementById('currentYearDetail').innerHTML=evts.map(e=>{
      bal+=e.delta;const f=e.date>today,c=f?' class="future"':'';
      if(e.type==='carryover'){const cls=e.delta<0?'val-minus':'val-plus';const sign=e.delta<0?'':'+';return `<tr${c}><td>${fmt(e.date)}</td><td><span class="badge badge--carryover">이월</span></td><td class="text-left">${e.label}</td><td class="${cls}">${sign}${numFmt(e.delta)}</td><td>-</td><td class="val-balance">${numFmt(bal)}</td></tr>`}
      if(e.type==='grant')return `<tr${c}><td>${fmt(e.date)}</td><td><span class="badge badge--grant">부여</span></td><td class="text-left">${e.label}</td><td class="val-plus">+${e.delta}</td><td>-</td><td class="val-balance">${numFmt(bal)}</td></tr>`;
      if(e.type==='expired')return `<tr${c}><td>${fmt(e.date)}</td><td><span class="badge badge--expired" style="background:#fee2e2;color:#dc2626">소멸</span></td><td class="text-left">${e.label}</td><td>-</td><td class="val-minus">-${numFmt(Math.abs(e.delta))}</td><td class="val-balance">${numFmt(bal)}</td></tr>`;
      return `<tr${c}><td>${fmt(e.date)}</td><td><span class="badge badge--used">사용</span></td><td class="text-left">${e.label}</td><td>-</td><td class="val-minus">-${numFmt(Math.abs(e.delta))}</td><td class="val-balance">${numFmt(bal)}</td></tr>`}).join('');
    const curUsedDays=evts.filter(e=>e.type==='used').reduce((s,e)=>s+Math.abs(e.delta),0);
    var curDashUsed=curUsedDays,curDashTotal=days,curDashRemaining=totalWithCarry-curUsedDays,isY1=false;
  }

  function gaugeSVG(used,total,color){
    const sz=140,sw=12,r=(sz-sw)/2,circ=2*Math.PI*r,pct=total>0?Math.min(used/total,1):0,off=circ*(1-pct);
    return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#E0DCD4" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 ${sz/2} ${sz/2})" style="transition:stroke-dashoffset .6s ease-in-out"/></svg>`;
  }

  // 생일연차 상태
  const thisYear=String(today.getFullYear());
  const bdThisYear=used.filter(u=>u.type==='생일연차'&&u.date.startsWith(thisYear));
  const bdPast=bdThisYear.some(u=>toDate(u.date)<=today);
  const bdFuture=bdThisYear.some(u=>toDate(u.date)>today);
  let bdStatus='미설정';
  const probationDays=Math.floor((today-hireDate)/86400000);
  const isProbation=probationDays<90; // 3개월(90일) 미만 수습
  if(isProbation){
    bdStatus='수습기간';
  }else if(settings.birthday){
    const bMonth=parseInt(settings.birthday.split('-')[0],10);
    const curMonth=today.getMonth()+1;
    if(bdPast) bdStatus='사용완료';
    else if(bdFuture) bdStatus='사용예정';
    else if(curMonth>bMonth) bdStatus='소멸';
    else if(curMonth===bMonth) bdStatus=bMonth+'월 사용가능';
    else bdStatus=bMonth+'월 예정';
  }
  const bdMini=`<div class="dash-mini"><div class="dash-mini__label">생일연차</div><div class="dash-mini__val">${bdStatus}</div></div>`;

  // 대시보드
  const gc=curDashRemaining<=3?THEMES[selectedTheme].gaugeDanger:curDashRemaining<=7?THEMES[selectedTheme].gaugeWarn:THEMES[selectedTheme].gauge;
  let dash='';
  if(isY1){
    const pend=11-curAccrued;
    dash=`<div class="dash-top"><div class="gauge">${gaugeSVG(curDashUsed,curAccrued,gc)}<div class="gauge__center"><span class="gauge__number">${numFmt(curDashRemaining)}</span><span class="gauge__unit">잔여일수</span></div></div>
    <div class="dash-summary"><div class="dash-summary__title">1년 미만 월차 현황</div>
    <div class="dash-section"><div class="dash-section__head">+ 발생</div>
    <div class="dash-summary__row"><span class="dash-summary__label">월차 발생 (현재까지)</span><span class="dash-summary__val" style="color:var(--krds-primary)">+${curAccrued}일</span></div>
    <div class="dash-summary__row"><span class="dash-summary__label">생일연차</span><span class="dash-summary__val" style="color:var(--krds-warning)">${bdStatus}</span></div></div>
    <div class="dash-section"><div class="dash-section__head">- 차감</div>
    <div class="dash-summary__row"><span class="dash-summary__label">사용</span><span class="dash-summary__val" style="color:var(--krds-error)">-${numFmt(curDashUsed)}일</span></div></div>
    <div class="dash-total"><span class="dash-total__label">잔여</span><span class="dash-total__val">${numFmt(curDashRemaining)}일</span></div>
    </div></div>
    <div class="dash-bottom"><div class="dash-mini"><div class="dash-mini__label">총 발생</div><div class="dash-mini__val">${curAccrued} / 11일</div></div>
    <div class="dash-mini"><div class="dash-mini__label">사용</div><div class="dash-mini__val">${numFmt(curDashUsed)}일</div></div>
    <div class="dash-mini"><div class="dash-mini__label">발생 예정</div><div class="dash-mini__val">${pend}일</div></div>
    <div class="dash-mini"><div class="dash-mini__label">사용기한</div><div class="dash-mini__val">${fmt(dayBefore(curEnd))}</div></div>
    ${bdMini}</div>`;
  }else{
    const dashTotal=curDashTotal+effectiveCarryover;
    // 이월 종료 상태
    let carryoverExpiryStatus='';
    if(carryoverExpiry){
      if(today>=carryoverExpiry) carryoverExpiryStatus=carryover>0?(curCarryoverExpired>0?'소멸':'사용완료'):'해당없음';
      else carryoverExpiryStatus='진행중';
    }
    const expiryColor=carryoverExpiryStatus==='소멸'?'var(--krds-error)':carryoverExpiryStatus==='진행중'?'#6B5B95':'var(--krds-g400)';
    const expiredRow=curCarryoverExpired>0?`<div class="dash-summary__row"><span class="dash-summary__label">이월 소멸</span><span class="dash-summary__val" style="color:var(--krds-error)">-${numFmt(curCarryoverExpired)}일</span></div>`:'';
    // 이월 종료일 부가 텍스트
    const expiryNote=carryoverExpiry?`<span style="font-size:11px;color:${expiryColor};margin-left:4px">(이월종료 ${fmt(dayBefore(carryoverExpiry))} ${carryoverExpiryStatus})</span>`:'';
    dash=`<div class="dash-top"><div class="gauge">${gaugeSVG(curDashUsed,Math.max(dashTotal,0),gc)}<div class="gauge__center"><span class="gauge__number">${numFmt(curDashRemaining)}</span><span class="gauge__unit">잔여일수</span></div></div>
    <div class="dash-summary"><div class="dash-summary__title">${dY}년 이상 연차 현황</div>
    <div class="dash-section"><div class="dash-section__head">+ 발생</div>
    <div class="dash-summary__row"><span class="dash-summary__label">연차 부여</span><span class="dash-summary__val" style="color:var(--krds-primary)">+${curDashTotal}일</span></div>
    <div class="dash-summary__row"><span class="dash-summary__label">전년 이월 ${expiryNote}</span><span class="dash-summary__val" style="color:${carryover>0?'#6B5B95':'var(--krds-g400)'}">${carryover>0?'+'+numFmt(carryover):'0'}일</span></div>
    <div class="dash-summary__row"><span class="dash-summary__label">생일연차</span><span class="dash-summary__val" style="color:var(--krds-warning)">${bdStatus}</span></div></div>
    <div class="dash-section"><div class="dash-section__head">- 차감</div>
    <div class="dash-summary__row"><span class="dash-summary__label">사용</span><span class="dash-summary__val" style="color:var(--krds-error)">-${numFmt(curDashUsed)}일</span></div>
    ${curCarryoverExpired>0?`<div class="dash-summary__row"><span class="dash-summary__label">이월 소멸</span><span class="dash-summary__val" style="color:var(--krds-error)">-${numFmt(curCarryoverExpired)}일</span></div>`:''}</div>
    <div class="dash-total"><span class="dash-total__label">잔여</span><span class="dash-total__val">${numFmt(curDashRemaining)}일</span></div>
    </div></div>
    <div class="dash-bottom"><div class="dash-mini"><div class="dash-mini__label">부여</div><div class="dash-mini__val">${curDashTotal}일</div></div>
    <div class="dash-mini"><div class="dash-mini__label">이월</div><div class="dash-mini__val" style="color:${carryover>0?'#6B5B95':'var(--krds-g400)'}">${carryover>0?'+'+numFmt(carryover):'0'}일</div></div>
    ${carryoverExpiry?`<div class="dash-mini"><div class="dash-mini__label">이월 종료일</div><div class="dash-mini__val" style="color:${expiryColor}">${fmt(dayBefore(carryoverExpiry))}</div></div>`:''}
    <div class="dash-mini"><div class="dash-mini__label">사용</div><div class="dash-mini__val">${numFmt(curDashUsed)}일</div></div>
    <div class="dash-mini"><div class="dash-mini__label">사용기한</div><div class="dash-mini__val">${fmt(dayBefore(curEnd))}</div></div>
    ${bdMini}</div>`;
  }
  document.getElementById('dashboard').innerHTML=dash;

  await renderCal();
}

let calYear,calMonth;
(function(){const t=getToday();calYear=t.getFullYear();calMonth=t.getMonth()})();
function calMove(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++}else if(calMonth<0){calMonth=11;calYear--}renderCal().catch(console.error)}
async function renderCal(){
  const used=LINK_MODE?await fetchUsedFromDB(LINK_DATA.name):load(KEYS.used,DEFAULT_USED);
  const today=getToday();
  const DOW=['일','월','화','수','목','금','토'];
  const fd=new Date(calYear,calMonth,1).getDay(),dim=new Date(calYear,calMonth+1,0).getDate();
  document.getElementById('calLabel').textContent=calYear+'.'+(calMonth+1);
  let h=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<fd;i++)h+='<div class="cal-cell"><div class="cal-day cal-day--empty"></div></div>';
  for(let d=1;d<=dim;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isT=new Date(calYear,calMonth,d).getTime()===today.getTime();
    const m=used.filter(u=>u.date===ds);
    const hd=isHoliday(ds);
    let c='cal-day';if(isT)c+=' cal-day--today';
    if(m.length>0){if(m.some(u=>u.type==='연차'))c+=' cal-day--used';else c+=' cal-day--half'}
    else if(hd)c+=' cal-day--holiday';
    h+=`<div class="cal-cell"><div class="${c}" ${hd?'title="'+hd+'"':''}>${d}</div></div>`;
  }
  document.getElementById('calGrid').innerHTML=h;
}

(async function(){
  if(LINK_MODE){
    // 링크 모드: 항상 링크 데이터로 설정 덮어쓰기 (테마는 유지)
    const existing=load(KEYS.settings,DEFAULT_SETTINGS);
    save(KEYS.settings,{...DEFAULT_SETTINGS,theme:existing.theme||'sage'});
    // 링크 모드: Supabase에서 데이터 로드 (localStorage 버전 관리 불필요)
  }else{
    if(!localStorage.getItem(KEYS.settings))save(KEYS.settings,DEFAULT_SETTINGS);
    if(!localStorage.getItem(KEYS.used))save(KEYS.used,DEFAULT_USED);
  }
  const savedTheme=load(KEYS.settings,DEFAULT_SETTINGS).theme||'sage';
  applyTheme(savedTheme);
  await render();
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSettings()});
  document.getElementById('settingsModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSettings()});
})();
</script>
