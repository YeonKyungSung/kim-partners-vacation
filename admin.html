<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연차휴가 관리 — 관리자</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root {
  /* KRDS-inspired tokens (sage green adaptation) */
  --krds-primary: #4A5D4F;
  --krds-primary-dark: #3B4B3F;
  --krds-primary-deep: #2C3830;
  --krds-primary-light: #E8EDE9;
  --krds-primary-50: #F3F5F3;
  --krds-bg: #F5F2ED;
  --krds-surface: #FDFCFA;
  --krds-white: #FFFFFF;
  --krds-g50: #F8F6F2;
  --krds-g100: #EFECE6;
  --krds-g200: #CDD1D5;
  --krds-g300: #B1B8BE;
  --krds-g400: #8A949E;
  --krds-g500: #6D7882;
  --krds-g600: #58616A;
  --krds-g700: #464C53;
  --krds-g800: #33363D;
  --krds-g900: #1E2124;
  --krds-success: #228738;
  --krds-success-bg: #EAF6EC;
  --krds-warning: #9E6A00;
  --krds-warning-bg: #FFF3DB;
  --krds-warning-base: #FFB114;
  --krds-error: #DE3412;
  --krds-error-bg: #FDEFEC;
  --krds-info: #0B78CB;
  --krds-info-bg: #E7F4FE;
  --krds-font: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --krds-radius: 4px;
  --krds-radius-md: 6px;
  --krds-radius-lg: 10px;
  --krds-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --krds-shadow-md: 0 4px 12px rgba(0,0,0,.1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--krds-font);font-size:15px;font-weight:400;line-height:1.5;color:var(--krds-g900);background:var(--krds-bg)}

/* Masthead */
.masthead{
  background:var(--krds-primary-deep);
  height:36px;display:flex;align-items:center;
  padding:0 24px;
  font-size:12px;font-weight:500;color:rgba(255,255,255,.6);
  letter-spacing:.04em;text-transform:uppercase;
}
.masthead__inner{max-width:1200px;margin:0 auto;width:100%}

/* Header */
.header{background:var(--krds-primary);padding:0;position:relative;z-index:10}
.header__inner{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
.header__title{font-size:19px;font-weight:700;color:#fff;letter-spacing:-.02em;display:flex;align-items:center}
.header__actions{display:flex;gap:6px;align-items:center}
.header__date{
  font-size:13px;color:rgba(255,255,255,.8);
  padding:4px 14px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  border-radius:20px;
}
.btn-header{
  padding:6px 14px;border:1px solid rgba(255,255,255,.3);
  border-radius:var(--krds-radius);background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.9);font-size:13px;font-weight:600;
  cursor:pointer;transition:all 150ms;font-family:var(--krds-font);
}
.btn-header:hover{background:rgba(255,255,255,.18)}

/* Layout — KRDS 1200px max, 24px gutter */
.container{max-width:1200px;margin:0 auto;padding:24px}
.dashboard{display:flex;flex-direction:column;gap:16px;margin-bottom:24px}
.dash-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.card{background:var(--krds-surface);border-radius:var(--krds-radius-lg);padding:18px 20px;border:1px solid var(--krds-g100)}
.card__label{font-size:12px;font-weight:700;color:var(--krds-g500);margin-bottom:6px}
.card__val{font-size:32px;font-weight:800;line-height:1.1}
.card__val--primary{color:var(--krds-primary)}
.card__val--warn{color:var(--krds-warning)}
.card__val--err{color:var(--krds-error)}
.card__val--purple{color:#6B5B95}
.card__sub{font-size:12px;color:var(--krds-g400);margin-top:6px;line-height:1.4}
.dash-panels{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dash-panel{background:var(--krds-surface);border-radius:var(--krds-radius-lg);padding:16px 20px;border:1px solid var(--krds-g100)}
.dash-panel__title{font-size:13px;font-weight:700;color:var(--krds-g700);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--krds-g100)}
.dash-panel__list{list-style:none;padding:0;margin:0;max-height:180px;overflow-y:auto}
.dash-panel__item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--krds-g50);font-size:13px}
.dash-panel__item:last-child{border-bottom:none}
.dash-panel__name{font-weight:600;color:var(--krds-g800)}
.dash-panel__dept{font-size:11px;color:var(--krds-g400);margin-left:4px}
.dash-panel__badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.dash-panel__empty{color:var(--krds-g300);font-size:13px;padding:12px 0;text-align:center}

/* Mini Calendar */
.mini-cal{background:var(--krds-surface);border-radius:var(--krds-radius-lg);border:1px solid var(--krds-g100);padding:20px 24px}
.mini-cal__header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--krds-g100)}
.mini-cal__title{font-size:17px;font-weight:700;color:var(--krds-g900)}
.mini-cal__nav{display:flex;gap:4px}
.mini-cal__nav button{background:var(--krds-g50);border:1px solid var(--krds-g100);border-radius:var(--krds-radius-md);width:32px;height:32px;cursor:pointer;font-size:16px;color:var(--krds-g500);display:flex;align-items:center;justify-content:center;transition:background .15s}
.mini-cal__nav button:hover{background:var(--krds-g100)}
.mini-cal__grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;text-align:center}
.mini-cal__dow{font-size:12px;font-weight:700;color:var(--krds-g400);padding:8px 0;border-bottom:2px solid var(--krds-g100)}
.mini-cal__dow--sun{color:#C44D3E}
.mini-cal__day{padding:6px 2px;min-height:52px;display:flex;flex-direction:column;align-items:center;gap:4px;border-bottom:1px solid var(--krds-g50)}
.mini-cal__day--today .mini-cal__num{background:#C44D3E;color:#fff;font-weight:700;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center}
.mini-cal__day--holiday .mini-cal__num{color:#C44D3E}
.mini-cal__day--holiday .mini-cal__hname{font-size:8px;color:#C44D3E;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48px}
.mini-cal__day--other{opacity:.3}
.mini-cal__day--sun .mini-cal__num{color:#C44D3E}
.mini-cal__day--sat .mini-cal__num{color:#4A7AB5}
.mini-cal__num{font-size:15px;font-weight:600;color:var(--krds-g800);line-height:1;width:30px;height:30px;display:flex;align-items:center;justify-content:center}
.mini-cal__count{background:var(--krds-primary);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;cursor:default;line-height:1.4}
.mini-cal__legend{display:flex;gap:16px;margin-top:12px;padding-top:10px;border-top:1px solid var(--krds-g100)}
.mini-cal__legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--krds-g500)}

/* Table — KRDS: text left, numbers right */
.panel{background:var(--krds-surface);border-radius:var(--krds-radius-lg);border:1px solid var(--krds-g100);overflow:hidden;margin-bottom:24px}
.panel__head{padding:16px 24px;border-bottom:1px solid var(--krds-g100);display:flex;justify-content:space-between;align-items:center}
.panel__title{font-size:17px;font-weight:700}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--krds-g50);color:var(--krds-g700);font-size:13px;font-weight:700;padding:12px 16px;text-align:center;white-space:nowrap;border-bottom:2px solid var(--krds-g200)}
.tbl td{padding:12px 16px;text-align:center;border-bottom:1px solid var(--krds-g100);font-size:13px;color:var(--krds-g800)}
.tbl tr:hover{background:var(--krds-primary-50)}
.tbl tr.selected{background:var(--krds-primary-light)}
.tbl tr{cursor:pointer;transition:background .1s}
.tbl td.dept-cell{background:var(--krds-g50);font-weight:700;color:var(--krds-primary-dark);vertical-align:middle;font-size:13px}
.tbl tr.dept-first td{border-top:1px solid var(--krds-g100)}
.remain-bar{display:inline-flex;align-items:center;gap:6px;width:100%}
.remain-bar__track{flex:1;height:6px;background:var(--krds-g100);border-radius:3px;overflow:hidden}
.remain-bar__fill{height:100%;border-radius:3px;transition:width .3s}
.remain-bar__num{font-weight:800;font-size:15px;min-width:36px;text-align:right}
.td-carry{line-height:1.5}
.td-carry__expiry{font-size:10px;color:var(--krds-g400);display:block}
.text-left{text-align:left}

/* Badges — KRDS: radius-sm 4px */
.badge{display:inline-block;padding:3px 10px;border-radius:var(--krds-radius);font-size:11px;font-weight:700}
.badge--ok{background:var(--krds-success-bg);color:var(--krds-success);border:1px solid #C0D9C4}
.badge--warn{background:var(--krds-warning-bg);color:var(--krds-warning);border:1px solid #E8D9A8}
.badge--danger{background:var(--krds-error-bg);color:var(--krds-error);border:1px solid #F5C4BA}
.badge--used{background:var(--krds-primary);color:#fff;border:1px solid var(--krds-primary-dark)}
.badge--half{background:var(--krds-primary-light);color:var(--krds-primary);border:1px solid #C0D4C2}
.badge--birthday{background:var(--krds-warning-bg);color:var(--krds-warning);border:1px solid #E8D9A8}.badge--carryover{background:#EDE8F5;color:#6B5B95;border:1px solid #C5BBD9}
.badge--resigned{background:var(--krds-g50);color:var(--krds-g300);border:1px solid var(--krds-g200)}
.tbl tr.resigned-row td{color:var(--krds-g300);background:var(--krds-g50)}

/* Detail panel */
.detail{display:none}
.detail.active{display:block}
.detail__header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.detail__name{font-size:19px;font-weight:700}
.detail__info{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.detail__info span{font-size:13px;color:var(--krds-g500)}
.detail__info strong{color:var(--krds-g900)}

/* Detail dashboard — gauge + summary */
.detail-dash{display:flex;align-items:center;gap:24px;padding:20px;background:linear-gradient(135deg,#f0f4f1 0%,#fff 100%);border-radius:var(--krds-radius-md);border:1px solid var(--krds-g100);margin-bottom:16px}
.detail-gauge{position:relative;flex-shrink:0}
.detail-gauge svg{display:block}
.detail-gauge__center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.detail-gauge__num{font-size:32px;font-weight:900;color:var(--krds-g900);line-height:1}
.detail-gauge__unit{font-size:11px;color:var(--krds-g500);margin-top:3px;font-weight:600}
.detail-summary{flex:1;min-width:0}
.detail-summary__title{font-size:14px;font-weight:700;color:var(--krds-g900);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--krds-primary)}
.detail-section{padding:4px 0;border-bottom:1px solid var(--krds-g100)}
.detail-section:last-child{border-bottom:none}
.detail-section__head{font-size:10px;font-weight:700;color:var(--krds-g400);margin-bottom:1px;letter-spacing:.04em}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.detail-row__label{color:var(--krds-g500)}
.detail-row__val{font-weight:700;font-size:15px}
.detail-total{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-top:6px;background:var(--krds-primary-50);border-radius:6px;border:1.5px solid var(--krds-primary)}
.detail-total__label{font-size:13px;font-weight:700;color:var(--krds-g700)}
.detail-total__val{font-size:22px;font-weight:900;color:var(--krds-primary)}
.detail-minis{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));border-top:1px solid var(--krds-g100);margin-bottom:16px}
.detail-mini{padding:10px 8px;text-align:center;border-right:1px solid var(--krds-g100);background:var(--krds-g50)}
.detail-mini:last-child{border-right:none}
.detail-mini__label{font-size:10px;color:var(--krds-g400);font-weight:700;margin-bottom:2px}
.detail-mini__val{font-size:14px;font-weight:700;color:var(--krds-g800)}

/* Form — KRDS: radius-md 6px for inputs/buttons */
.form-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.input{padding:8px 12px;border:1px solid var(--krds-g200);border-radius:var(--krds-radius-md);font-family:var(--krds-font);font-size:15px;background:#fff;color:var(--krds-g900);transition:border-color .15s}
.input:focus{outline:none;border-color:var(--krds-primary);box-shadow:0 0 0 3px rgba(58,107,78,.12)}
select.input{min-width:120px}
.btn{padding:8px 16px;border:none;border-radius:var(--krds-radius-md);font-family:var(--krds-font);font-size:13px;font-weight:700;cursor:pointer;transition:all 150ms}
.btn--primary{background:var(--krds-primary);color:#fff}
.btn--primary:hover{background:var(--krds-primary-dark)}
.btn--secondary{background:var(--krds-g50);color:var(--krds-g700);border:1px solid var(--krds-g200)}
.btn--secondary:hover{background:var(--krds-g100)}
.btn--danger{background:var(--krds-error);color:#fff}
.btn--danger:hover{background:#BD2C0F}
.btn--sm{padding:5px 12px;font-size:12px}
.btn--export{background:var(--krds-primary-light);color:var(--krds-primary);border:1px solid #C0D4C2}
.btn--export:hover{background:#D8E6DA}

/* Detail table */
.detail-tbl{width:100%;border-collapse:collapse}
.detail-tbl th{background:var(--krds-g50);color:var(--krds-g700);font-size:12px;font-weight:700;padding:10px 12px;text-align:center;border-bottom:2px solid var(--krds-g200)}
.detail-tbl td{padding:10px 12px;text-align:center;border-bottom:1px solid var(--krds-g100);font-size:13px}

/* Responsive — KRDS breakpoints */
@media(max-width:1024px){
  .dash-panels{grid-template-columns:1fr}
  .summary-cards{flex-direction:row}
}
@media(max-width:768px){
  .container{padding:16px}
  .summary-cards{flex-direction:column}
  .stats{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .form-row{flex-direction:column;align-items:stretch}
}

/* Print */
@media print{
  body{background:#fff;font-size:11px}
  .masthead{background:#222;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .header{background:var(--krds-primary);-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .tbl th,.detail-tbl th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .btn,.form-row,.no-print{display:none!important}
  .detail.active{display:block}
}
</style>
</head>

<div class="masthead"><div class="masthead__inner">Kim &amp; Partners Law Firm &middot; Annual Leave Management System</div></div>

<header class="header">
  <div class="header__inner">
    <h1 class="header__title"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAADXUlEQVR4nO2c27UbMQwDTZeR/mtLG0gHzsqmSBDEfOc4WmJW1oO+r5cxxhhjjDHGGGOMMcYYY4wxxhhjjDHTAfC3ewwsvF/L+BQ+FoqxSoAnAWOZBGsEOAkWiyRYIcA3gWKJBPIC/BIkFkggLUBGgBCXQFqALCAsgQVYLoEFWC6BBVgugQVYLoEFWC7BeAE6g4CABKMFYAgABGNYKQBT4UE0lhUCMBYchGOSFKCr0BHxR1GCUQJ0FzgEJRgjAEthQ0yCEQKwFTSEJKAXgLWQISIBtQDsBQwBCWgFeFq4JyHcJIZLQCnAlPAVJKATYFr40yV4q4bfUewgHdcIAaaHP2V8lAKohD9tnBQCdIRfsX6IIRK0CqAa/iQJ2gRQD3+KBC0CbAl/ggTlAmwLn12CUgG2hn9CtQRx8o+7FyynnIaPYc+X8eyhWphv3nwMfM5f6/BWLMq0aX/1QZAhF2Di2zRx1upCdgawBK9HL29kFvR//+FJKFmfdTKD4cNnMs2EGVkczwAZe/PMIj79rI0zQRzU+egroFKCTMuVJEDyS3a8BrAEfdyYYb9aBGZM5Z4Jzrj19fr1LiBjkWYJnnFzbfXTNvCJBF4T/MbthfXP5wBT1wQTQMGuKuUgyBLkU7WlTjsJtAR5VJ6npB4Fs+0OJoLC8K/cBbDtDiaB4vCvXQZZghnhX70NrJRgOmgK//p1cOU5wVTQ/PzX+wHYbhGZAMFzlzSEWALO8Es7giwBX/jlLWGV5wSsgCj8lp7AzbsDkIXf1hS6UQIQht/aFbxJApCG394WvkECEIdP8buAjMMiVkAePoUAzL+dVw+fRgA1CTAkfCoB2AqzIXw6AbJ/XlYNhoVPKcBUCTAwfFoB2K6S40chWcOnFoDlAimEw6cXoFuCEA9/hABdEsSC8McIUC1BLAl/lABV/QSxKPzjPxTJQlcIELickhCgIwwIhj/uK6Dr7gCi4Y8WoEoCCIc/XoDbEkA8fAkBboWABeHLCJB9gYQl4Y/eBdwKD4vCl5oBMtYEWBa+pADfSoCF4csKcCoBloYvuQa4cRgUouFLzwBVDSHTkRfgZkOIAisEuNEQosIaATIbQpRYJUBGQ4ga6wT4FHIsC98YY4wxxhhjjDHGGGOMMcYYY4wxxgjyD9f+9Uav1z6bAAAAAElFTkSuQmCC" alt="KP" style="height:28px;vertical-align:middle;margin-right:10px;border-radius:4px;"/> 법무법인 김앤파트너스 연차휴가 관리 <span style="font-weight:400;font-size:14px;opacity:.7;margin-left:8px">(관리자)</span></h1>
    <div class="header__actions">
      <span class="header__date" id="todayBadge"></span>
    </div>
  </div>
</header>

<div class="container">
  <!-- Dashboard -->
  <div class="dashboard" id="dashboardArea"></div>

  <!-- Employee Overview Table -->
  <div class="panel">
    <div class="panel__head">
      <div class="panel__title">전 직원 연차 현황</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn--primary no-print" onclick="openEmpForm()">직원 추가</button>
        <button class="btn btn--export" onclick="exportAllCSV()">전체 CSV 내보내기</button>
        <button class="btn btn--secondary" onclick="window.print()">인쇄</button>
      </div>
    </div>
    <table class="tbl">
      <thead>
        <tr>
          <th>부서</th>
          <th>성명</th>
          <th>부여</th>
          <th>이월</th>
          <th>사용</th>
          <th>잔여</th>
          <th>생일</th>
          <th class="no-print">관리</th>
        </tr>
      </thead>
      <tbody id="empTable"></tbody>
    </table>
  </div>

  <!-- Employee Management -->
  <div class="panel no-print" id="empMgmtPanel" style="display:none">
    <div class="panel__head">
      <div class="panel__title" id="empMgmtTitle">직원 등록</div>
      <button class="btn btn--secondary" onclick="closeEmpForm()">닫기</button>
    </div>
    <div style="padding:18px">
      <input type="hidden" id="empEditId"/>
      <div class="form-row">
        <div style="flex:1"><label style="font-size:12px;color:var(--krds-g500)">성명</label><input type="text" id="empName" class="input" style="width:100%" placeholder="홍길동"/></div>
        <div style="flex:1"><label style="font-size:12px;color:var(--krds-g500)">부서</label><select id="empDept" class="input" style="width:100%"></select></div>
        <div style="flex:1"><label style="font-size:12px;color:var(--krds-g500)">입사일</label><input type="date" id="empHireDate" class="input" style="width:100%"/></div>
        <div style="flex:1"><label style="font-size:12px;color:var(--krds-g500)">생일 (월-일)</label><input type="text" id="empBirthday" class="input" style="width:100%" placeholder="03-15"/></div>
        <div style="display:flex;align-items:flex-end"><button class="btn btn--primary" onclick="saveEmployee()">저장</button></div>
      </div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="detail" id="detailPanel">
    <div class="panel">
      <div class="panel__head">
        <div>
          <div class="detail__name" id="detailName"></div>
          <div class="detail__info" id="detailInfo"></div>
        </div>
        <button class="btn btn--secondary" onclick="closeDetail()">닫기</button>
      </div>
      <div style="padding:18px">
        <!-- Dashboard -->
        <div id="detailDash"></div>

        <!-- Add vacation form -->
        <div class="form-row no-print">
          <input type="date" id="addDate" class="input"/>

const EMP_KEY='vac_admin_employees';
function loadEmployees(){try{const v=localStorage.getItem(EMP_KEY);return v?JSON.parse(v):[]}catch{return[]}}
function saveEmployees(list){localStorage.setItem(EMP_KEY,JSON.stringify(list))}
function getEmployees(){return loadEmployees()}

/* ═══════════════════════════════════════════════
   Core functions
   ═══════════════════════════════════════════════ */
function storageKey(empId){ return 'vac_admin_'+empId; }
function loadUsed(empId){
  // admin 자체 데이터
  let adminData=[];
  try{const v=localStorage.getItem(storageKey(empId));if(v)adminData=JSON.parse(v)}catch{}
  // 개별 사원 페이지 데이터도 병합
  const emp=getEmployees().find(e=>e.id===empId);
  if(emp){
    try{
      const linkData=localStorage.getItem('vac_link_used_'+emp.name);
      if(linkData){
        const linkUsed=JSON.parse(linkData);
        if(linkUsed.length>0){
          // 개별 페이지 데이터가 있으면 그것을 우선 사용 (사원이 직접 입력한 데이터)
          return linkUsed;
        }
      }
    }catch{}
  }
  return adminData;
}
function saveUsed(empId,arr){
  localStorage.setItem(storageKey(empId),JSON.stringify(arr));
  // 개별 사원 페이지에도 동기화
  const emp=getEmployees().find(e=>e.id===empId);
  if(emp){try{localStorage.setItem('vac_link_used_'+emp.name,JSON.stringify(arr))}catch{}}
}
function toDate(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fmt(d){return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')}
function fmtISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dayVal(u){return u.type==='오전반차'||u.type==='오후반차'?0.5:1}
function isBirthday(u){return u.type==='생일연차'}
function isSpecialLeave(u){return u.type==='생일연차'}
function getToday(){const d=new Date();d.setHours(0,0,0,0);return d}
function getAnnualDays(y){if(y<2)return 0;return Math.min(15+Math.floor((y-2)/2),25)}
function numFmt(n){return n%1===0?String(n):n.toFixed(1)}

/* ═══════════════════════════════════════════════
   Calculate vacation status for one employee
   ═══════════════════════════════════════════════ */
function calcEmployee(emp){
  const today=getToday();
  if(!emp.hireDate)return {emp,yi:0,total:0,accrued:0,carryover:0,used:0,remaining:0,totalWithCarry:0,remainingAll:0,birthdayUsed:[],regularUsed:[],noHireDate:true};
  const hireDate=toDate(emp.hireDate);
  const used=loadUsed(emp.id);
  const regularUsed=used.filter(u=>!isSpecialLeave(u));
  const birthdayUsed=used.filter(u=>isBirthday(u));
  const specialUsed=used.filter(u=>isSpecialLeave(u));

  // Year boundaries
  const yearEnds=[];
  for(let i=1;i<=10;i++){const d=new Date(hireDate);d.setFullYear(d.getFullYear()+i);yearEnds.push(d)}

  // Determine current year index (0-based: 0=1년차)
  let currentYearIdx=0;
  for(let i=0;i<yearEnds.length;i++){if(today<yearEnds[i]){currentYearIdx=i;break}}

  const yi=currentYearIdx+1; // 1-based year

  // Calculate carryover chain
  let carryover=0;

  if(yi===1){
    // Year 1: monthly accrual
    const y1End=yearEnds[0];
    let accrued=0;
    for(let m=1;m<=11;m++){const d=new Date(hireDate);d.setMonth(d.getMonth()+m);if(d<=today)accrued++}
    const y1Used=regularUsed.filter(u=>{const d=toDate(u.date);return d>=hireDate&&d<y1End}).reduce((s,u)=>s+dayVal(u),0);
    return {emp,yi,total:11,accrued,carryover:0,used:y1Used,remaining:accrued-y1Used,totalWithCarry:11,remainingAll:11-y1Used,birthdayUsed,regularUsed};
  }

  // 이월 체인 계산 (24년도 연차발생일 기준 미사용분부터 이월, 유예기간: 연차종료일 + 3개월)
  const CARRYOVER_FROM=2024;
  const GRACE_MONTHS=3;
  const y1End=yearEnds[0];
  let carryoverExpiry=null,carryoverUsed=0,carryoverExpired=0;
  const y1Used=regularUsed.filter(u=>{const d=toDate(u.date);return d>=hireDate&&d<y1End}).reduce((s,u)=>s+dayVal(u),0);
  if(hireDate.getFullYear()>=CARRYOVER_FROM){
    carryover=Math.max(0,11-y1Used);
    carryoverExpiry=new Date(y1End);carryoverExpiry.setMonth(carryoverExpiry.getMonth()+GRACE_MONTHS);
  }

  // Year 2+ carryover chain
  for(let y=2;y<yi;y++){
    const start=yearEnds[y-2],end=yearEnds[y-1];
    const days=getAnnualDays(y);
    // 유예기간 내 사용분으로 이월 소진
    if(carryover>0&&carryoverExpiry){
      const graceEnd=carryoverExpiry<end?carryoverExpiry:end;
      const usedInGrace=regularUsed.filter(u=>{const d=toDate(u.date);return d>=start&&d<graceEnd}).reduce((s,u)=>s+dayVal(u),0);
      carryoverUsed=Math.min(carryover,usedInGrace);
      carryoverExpired=carryover-carryoverUsed;
    }else{carryoverUsed=0;carryoverExpired=0}
    const yUsed=regularUsed.filter(u=>{const d=toDate(u.date);return d>=start&&d<end}).reduce((s,u)=>s+dayVal(u),0);
    const thisYearNetUsed=yUsed-carryoverUsed;
    if(start.getFullYear()>=CARRYOVER_FROM){
      carryover=Math.max(0,days-thisYearNetUsed);
      carryoverExpiry=new Date(end);carryoverExpiry.setMonth(carryoverExpiry.getMonth()+GRACE_MONTHS);
    }else{carryover=0;carryoverExpiry=null}
  }

  // Current year — 이월 유예기간 계산
  const start=yearEnds[yi-2],end=yearEnds[yi-1];
  const days=getAnnualDays(yi);
  let curCarryoverUsed=0,curCarryoverExpired=0;
  if(carryover>0&&carryoverExpiry){
    const graceEnd=carryoverExpiry<end?carryoverExpiry:end;
    const usedInGrace=regularUsed.filter(u=>{const d=toDate(u.date);return d>=start&&d<graceEnd}).reduce((s,u)=>s+dayVal(u),0);
    curCarryoverUsed=Math.min(carryover,usedInGrace);
    if(today>=carryoverExpiry){curCarryoverExpired=carryover-curCarryoverUsed}
  }
  const effectiveCarryover=carryover-curCarryoverExpired;
  const totalWithCarry=days+effectiveCarryover;
  const curUsed=regularUsed.filter(u=>{const d=toDate(u.date);return d>=start&&d<end}).reduce((s,u)=>s+dayVal(u),0);
  const remaining=totalWithCarry-curUsed;

  return {emp,yi,total:days,accrued:days,carryover,carryoverExpiry,carryoverExpired:curCarryoverExpired,effectiveCarryover,used:curUsed,remaining,totalWithCarry,remainingAll:remaining,birthdayUsed,regularUsed};
}

/* ═══════════════════════════════════════════════
   Render overview
   ═══════════════════════════════════════════════ */
let selectedEmpId=null;
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth(); // 0-based

function renderMiniCal(year, month){
  const today=getToday();
  const emps=getEmployees().filter(e=>!e.resigned);
  const firstDay=new Date(year,month,1).getDay(); // 0=Sun
  const daysInMonth=new Date(year,month+1,0).getDate();
  const prevDays=new Date(year,month,0).getDate();
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // Build vacation map: day -> [{name, type}]
  const vacMap={};
  emps.forEach(emp=>{
    const used=loadUsed(emp.id);
    used.forEach(u=>{
      const d=toDate(u.date);
      if(d.getFullYear()===year&&d.getMonth()===month){
        const day=d.getDate();
        if(!vacMap[day])vacMap[day]=[];
        vacMap[day].push({name:emp.name,type:u.type});
      }
    });
  });

  let html=`<div class="mini-cal__header">
    <div class="mini-cal__nav"><button onclick="changeCalMonth(-1)">&lsaquo;</button></div>
    <div class="mini-cal__title">${year}년 ${monthNames[month]}</div>
    <div class="mini-cal__nav"><button onclick="changeCalMonth(1)">&rsaquo;</button></div>
  </div>`;
  html+='<div class="mini-cal__grid">';
  // DOW headers
  const dows=['일','월','화','수','목','금','토'];
  dows.forEach((d,i)=>html+=`<div class="mini-cal__dow${i===0?' mini-cal__dow--sun':''}">${d}</div>`);

  // Previous month trailing days
  for(let i=firstDay-1;i>=0;i--){
    html+=`<div class="mini-cal__day mini-cal__day--other"><div class="mini-cal__num">${prevDays-i}</div></div>`;
  }

  // Current month days
  for(let d=1;d<=daysInMonth;d++){
    const dow=new Date(year,month,d).getDay();
    const isToday=(year===today.getFullYear()&&month===today.getMonth()&&d===today.getDate());
    const dayClass=dow===0?' mini-cal__day--sun':dow===6?' mini-cal__day--sat':'';
    const entries=vacMap[d]||[];

    const dateStr=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const hName=isHoliday(dateStr);
    const todayClass=isToday?' mini-cal__day--today':'';
    const holidayClass=hName?' mini-cal__day--holiday':'';
    html+=`<div class="mini-cal__day${dayClass}${todayClass}${holidayClass}">`;
    html+=`<div class="mini-cal__num">${d}</div>`;
    if(hName) html+=`<div class="mini-cal__hname">${hName}</div>`;
    if(entries.length>0){
      const names=entries.map(e=>e.name+(e.type!=='연차'?' ('+e.type+')':'')).join('\n');
      html+=`<div class="mini-cal__count" title="${names}">${entries.length}</div>`;
    }
    html+='</div>';
  }

  // Next month leading days
  const totalCells=firstDay+daysInMonth;
  const remaining=totalCells%7===0?0:7-totalCells%7;
  for(let d=1;d<=remaining;d++){
    html+=`<div class="mini-cal__day mini-cal__day--other"><div class="mini-cal__num">${d}</div></div>`;
  }

  html+='</div>';
  html+=`<div class="mini-cal__legend">
    <div class="mini-cal__legend-item"><div class="mini-cal__count" style="font-size:8px;padding:0 4px">N</div>휴가 인원</div>
    <div class="mini-cal__legend-item"><div style="width:12px;height:12px;border-radius:50%;background:#C44D3E"></div>오늘</div>
    <div class="mini-cal__legend-item"><div style="width:12px;height:12px;border-radius:4px;background:var(--krds-error-bg);border:1px solid #F5C4BA"></div>공휴일</div>
  </div>`;

  document.getElementById('miniCal').innerHTML=html;
}

function changeCalMonth(delta){
  calMonth+=delta;
  if(calMonth>11){calMonth=0;calYear++}
  if(calMonth<0){calMonth=11;calYear--}
  renderMiniCal(calYear,calMonth);
}

function render(){
  const today=getToday();
  document.getElementById('todayBadge').textContent=fmt(today)+' 기준';

  const allResults=getEmployees().map(calcEmployee);
  const results=allResults.filter(r=>!r.emp.resigned);
  const resignedResults=allResults.filter(r=>r.emp.resigned);
  let totalEmp=results.length, zeroCount=0, totalUsed=0;

  // Group by department, preserve order
  const deptOrder=[];const deptMap={};
  results.forEach(r=>{
    const d=r.emp.dept||'미지정';
    if(!deptMap[d]){deptMap[d]=[];deptOrder.push(d)}
    deptMap[d].push(r);
  });

  const rows=[];
  const thisYear=String(today.getFullYear());
  deptOrder.forEach(dept=>{
    const group=deptMap[dept];
    group.forEach((r,idx)=>{
      totalUsed+=r.used;
      if(!r.noHireDate){
        if(r.remaining<=0)zeroCount++;
      }

      let bdStatus='-';
      if(r.emp.birthday){
        const bMonth=parseInt(r.emp.birthday.split('-')[0],10);
        const curMonth=today.getMonth()+1;
        const bdUsed=r.birthdayUsed.filter(u=>u.date.startsWith(thisYear));
        const bdPast=bdUsed.some(u=>toDate(u.date)<=today);
        const bdFuture=bdUsed.some(u=>toDate(u.date)>today);
        if(bdPast) bdStatus='사용완료';
        else if(bdFuture) bdStatus='사용예정';
        else if(curMonth>bMonth) bdStatus='소멸';
        else if(curMonth===bMonth) bdStatus='사용가능';
        else bdStatus=bMonth+'월';
      }

      let statusBadge;
      if(r.noHireDate) statusBadge='<span class="badge badge--warn">입사일 미설정</span>';
      else if(r.remaining<=0) statusBadge='<span class="badge badge--danger">소진</span>';
      else statusBadge='<span class="badge badge--ok">잔여</span>';

      const sel=r.emp.id===selectedEmpId?' selected':'';
      const firstClass=idx===0?' dept-first':'';
      const deptCell=idx===0?`<td class="dept-cell" rowspan="${group.length}">${dept}</td>`:'';

      // 잔여 바 색상 및 비율
      const remainPct=r.noHireDate?0:Math.max(0,Math.min(100,r.totalWithCarry>0?(r.remaining/r.totalWithCarry*100):0));
      const remainColor=r.remaining<=0?'var(--krds-error)':r.remaining<=3?'#E8933A':r.remaining<=7?'var(--krds-warning)':'var(--krds-success)';
      // 이월 셀: 이월+종료일 통합
      let carryCell='-';
      if(r.carryover>0){
        const exDate=r.carryoverExpiry?fmt(new Date(r.carryoverExpiry-86400000)):'';
        const usedTxt=r.carryoverExpired>0?`<span style="color:var(--krds-error);font-size:11px">${numFmt(r.carryoverExpired)}일 소멸</span>`:(r.carryoverExpiry&&today>=r.carryoverExpiry?`<span style="color:var(--krds-g400);font-size:11px">전량 사용</span>`:'');
        carryCell=`<span class="td-carry"><span style="color:#6B5B95;font-weight:600">+${numFmt(r.carryover)}일 이월</span>${usedTxt?' / '+usedTxt:''}${exDate?`<span class="td-carry__expiry">종료일 ${exDate}</span>`:''}</span>`;
      }else if(r.carryoverExpiry){
        carryCell=`<span class="td-carry"><span style="color:var(--krds-g400)">이월 없음</span><span class="td-carry__expiry">종료일 ${fmt(new Date(r.carryoverExpiry-86400000))}</span></span>`;
      }

      rows.push(`<tr class="${sel}${firstClass}" onclick="selectEmp('${r.emp.id}')">
        ${deptCell}
        <td class="text-left" style="font-weight:700">${r.emp.name} <span style="font-weight:400;color:var(--krds-g400);font-size:11px">${r.noHireDate?'':r.yi+'년차'}</span></td>
        <td>${r.noHireDate?'-':(r.yi===1?numFmt(r.accrued)+'/11':r.total)}</td>
        <td>${carryCell}</td>
        <td style="color:var(--krds-error)">${r.noHireDate?'-':numFmt(r.used)}</td>
        <td style="padding:8px 12px"><div class="remain-bar"><span class="remain-bar__num" style="color:${remainColor}">${r.noHireDate?'-':numFmt(r.remaining)}</span><div class="remain-bar__track"><div class="remain-bar__fill" style="width:${remainPct}%;background:${remainColor}"></div></div></div></td>
        <td style="font-size:11px;color:var(--krds-g500)">${bdStatus}</td>
        <td class="no-print" onclick="event.stopPropagation()"><button class="btn btn--secondary btn--sm" onclick="editEmployee('${r.emp.id}')">수정</button> <button class="btn btn--export btn--sm" onclick="openLink('${r.emp.id}')">링크</button> <button class="btn btn--secondary btn--sm" style="color:var(--krds-g400)" onclick="resignEmployee('${r.emp.id}')">퇴사</button></td>
      </tr>`);
    });
  });

  // 퇴사자는 즉시 삭제되므로 별도 섹션 불필요

  document.getElementById('empTable').innerHTML=rows.join('');

  // Dashboard
  const carryoverCount=results.filter(r=>r.carryover>0).length;
  const avgRemain=totalEmp>0?(results.reduce((s,r)=>s+r.remaining,0)/totalEmp):0;

  // 이번달+다음달 휴가 예정자
  const thisMonth=today.getMonth(),thisYear2=today.getFullYear();
  const upcomingLeaves=[];
  results.forEach(r=>{
    const used=loadUsed(r.emp.id);
    used.forEach(u=>{
      const d=toDate(u.date);
      if(d>=today&&d<new Date(thisYear2,thisMonth+2,1)){
        upcomingLeaves.push({name:r.emp.name,dept:r.emp.dept,date:u.date,type:u.type});
      }
    });
  });
  upcomingLeaves.sort((a,b)=>a.date.localeCompare(b.date));

  const upcomingHtml=upcomingLeaves.length>0?upcomingLeaves.slice(0,15).map(l=>{
    const typeColor=l.type==='연차'?'background:var(--krds-primary);color:#fff':l.type.includes('반차')?'background:var(--krds-primary-light);color:var(--krds-primary)':'background:var(--krds-warning-bg);color:var(--krds-warning)';
    return `<li class="dash-panel__item"><span><span class="dash-panel__name">${l.name}</span><span class="dash-panel__dept">${l.dept}</span></span><span><span class="dash-panel__badge" style="${typeColor}">${l.type}</span> <span style="color:var(--krds-g400);font-size:11px;margin-left:4px">${l.date.slice(5)}</span></span></li>`;
  }).join(''):`<li class="dash-panel__empty">예정된 휴가가 없습니다</li>`;

  document.getElementById('dashboardArea').innerHTML=`
    <div class="dash-cards">
      <div class="card"><div class="card__label">재직 인원</div><div class="card__val card__val--primary">${totalEmp}<span style="font-size:14px;font-weight:400;color:var(--krds-g400)">명</span></div><div class="card__sub">${today.getFullYear()}년 서울사무소</div></div>
      <div class="card"><div class="card__label">연차 소진</div><div class="card__val card__val--err">${zeroCount}<span style="font-size:14px;font-weight:400;color:var(--krds-g400)">명</span></div><div class="card__sub">잔여 0일 이하</div></div>
      <div class="card"><div class="card__label">이월 보유</div><div class="card__val card__val--purple">${carryoverCount}<span style="font-size:14px;font-weight:400;color:var(--krds-g400)">명</span></div><div class="card__sub">전년 이월 잔여</div></div>
    </div>
    <div class="dash-panel"><div class="dash-panel__title">예정 휴가 (${upcomingLeaves.length}건)</div><ul class="dash-panel__list">${upcomingHtml}</ul></div>`;

  if(selectedEmpId) renderDetail(selectedEmpId);
}

function renderDetail(empId){
  const emp=getEmployees().find(e=>e.id===empId);
  if(!emp)return;
  const r=calcEmployee(emp);
  const used=loadUsed(empId);
  const today=getToday();

  document.getElementById('detailName').textContent=emp.name;

  const hireDate=toDate(emp.hireDate);
  const dd=Math.floor((today-hireDate)/86400000),dY=Math.floor(dd/365),dM=Math.floor((dd%365)/30);
  document.getElementById('detailInfo').innerHTML=`
    <span><strong>부서</strong> ${emp.dept}</span>
    <span><strong>입사일</strong> ${emp.hireDate}</span>
    <span><strong>생일</strong> ${emp.birthday?emp.birthday.replace('-','월 ')+'일':'미설정'}</span>
    <span><strong>근속</strong> ${dY>0?dY+'년 ':''}${dM}개월</span>
    <span><strong>현재</strong> ${r.yi}년차</span>`;

  // Dashboard with gauge
  const dayBefore=d=>new Date(d-86400000);
  const gc=r.remaining<=3?'#C44D3E':r.remaining<=7?'#E8933A':'#3A6B4E';

  const sz=120,sw=10,rd=(sz-sw)/2,circ=2*Math.PI*rd,pct=total>0?Math.min(r.used/total,1):0,off=circ*(1-pct);
  const gaugeSVG=`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${rd}" fill="none" stroke="#E0DCD4" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${rd}" fill="none" stroke="${gc}" stroke-width="${sw}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 ${sz/2} ${sz/2})"/></svg>`;

  // 이월 관련
  let carryoverExpiryNote='';
  if(r.carryoverExpiry){
    const expiryPassed=today>=r.carryoverExpiry;
    const statusText=r.carryover>0?(expiryPassed?(r.carryoverExpired>0?'소멸':'사용완료'):'진행중'):'해당없음';
    const statusColor=statusText==='소멸'?'var(--krds-error)':statusText==='진행중'?'#6B5B95':'var(--krds-g400)';
    carryoverExpiryNote=`<span style="font-size:11px;color:${statusColor};margin-left:4px">(종료 ${fmt(dayBefore(r.carryoverExpiry))} ${statusText})</span>`;
  }

  // 생일연차
  const thisYear=String(today.getFullYear());
  let bdStatus='-';
  if(emp.birthday){
    const bMonth=parseInt(emp.birthday.split('-')[0],10);
    const curMonth=today.getMonth()+1;
    const bdUsed=r.birthdayUsed.filter(u=>u.date.startsWith(thisYear));
    if(bdUsed.some(u=>toDate(u.date)<=today)) bdStatus='사용완료';
    else if(bdUsed.some(u=>toDate(u.date)>today)) bdStatus='사용예정';
    else if(curMonth>bMonth) bdStatus='소멸';
    else if(curMonth===bMonth) bdStatus='사용가능';
    else bdStatus=bMonth+'월 예정';
  }

  // 사용기한
  const yearEnds=[];
  for(let i=1;i<=10;i++){const d=new Date(hireDate);d.setFullYear(d.getFullYear()+i);yearEnds.push(d)}
  const curEnd=yearEnds[r.yi-1]||yearEnds[0];

  document.getElementById('detailDash').innerHTML=`
    <div class="detail-dash">
      <div class="detail-gauge">${gaugeSVG}<div class="detail-gauge__center"><span class="detail-gauge__num">${numFmt(r.remaining)}</span><span class="detail-gauge__unit">잔여일수</span></div></div>
      <div class="detail-summary">
        <div class="detail-summary__title">${r.yi===1?'1년 미만 월차':''+dY+'년 이상 연차'} 현황</div>
        <div class="detail-section"><div class="detail-section__head">+ 발생</div>
          <div class="detail-row"><span class="detail-row__label">${r.yi===1?'월차 발생':'연차 부여'}</span><span class="detail-row__val" style="color:var(--krds-primary)">+${r.yi===1?numFmt(r.accrued):r.total}일</span></div>
          <div class="detail-row"><span class="detail-row__label">전년 이월 ${carryoverExpiryNote}</span><span class="detail-row__val" style="color:${r.carryover>0?'#6B5B95':'var(--krds-g400)'}">${r.carryover>0?'+'+numFmt(r.carryover):'0'}일</span></div>
          <div class="detail-row"><span class="detail-row__label">생일연차</span><span class="detail-row__val" style="color:var(--krds-warning);font-size:13px">${bdStatus}</span></div>
        </div>
        <div class="detail-section"><div class="detail-section__head">- 차감</div>
          <div class="detail-row"><span class="detail-row__label">사용</span><span class="detail-row__val" style="color:var(--krds-error)">-${numFmt(r.used)}일</span></div>
          ${r.carryoverExpired>0?`<div class="detail-row"><span class="detail-row__label">이월 소멸</span><span class="detail-row__val" style="color:var(--krds-error)">-${numFmt(r.carryoverExpired)}일</span></div>`:''}
        </div>
        <div class="detail-total"><span class="detail-total__label">= 잔여</span><span class="detail-total__val">${numFmt(r.remaining)}일</span></div>
      </div>
    </div>
    <div class="detail-minis">
      <div class="detail-mini"><div class="detail-mini__label">부여</div><div class="detail-mini__val">${r.yi===1?numFmt(r.accrued)+'/11':r.total}일</div></div>
      <div class="detail-mini"><div class="detail-mini__label">이월</div><div class="detail-mini__val" style="color:${r.carryover>0?'#6B5B95':'var(--krds-g400)'}">${r.carryover>0?'+'+numFmt(r.carryover):'0'}일</div></div>
      <div class="detail-mini"><div class="detail-mini__label">사용</div><div class="detail-mini__val" style="color:var(--krds-error)">${numFmt(r.used)}일</div></div>
      <div class="detail-mini"><div class="detail-mini__label">사용기한</div><div class="detail-mini__val">${fmt(dayBefore(curEnd))}</div></div>
    </div>`;

  // Used list
  if(used.length===0){
    document.getElementById('detailUsedList').innerHTML='<tr><td colspan="5" style="color:var(--krds-g400);padding:20px">등록된 사용 내역이 없습니다.</td></tr>';
  }else{
    document.getElementById('detailUsedList').innerHTML=used.map((u,i)=>{
      const isHalf=u.type==='오전반차'||u.type==='오후반차';
      const bc=isBirthday(u)?'badge--birthday':isHalf?'badge--half':'badge--used';
      const label=isBirthday(u)?emp.name+'(생일 휴가)':u.type;
      const dv=isBirthday(u)?'별도':numFmt(dayVal(u));
      return `<tr>
        <td>${i+1}</td><td>${u.date}</td>
        <td><span class="badge ${bc}">${label}</span></td>
        <td>${dv}</td>
        <td class="no-print"><button class="btn btn--danger btn--sm" onclick="removeVacation('${empId}','${u.date}','${u.type}')">삭제</button></td>
      </tr>`;
    }).join('');
  }
}

/* ═══════════════════════════════════════════════
   Add / Remove vacation
   ═══════════════════════════════════════════════ */
function addVacation(){
  if(!selectedEmpId){alert('직원을 먼저 선택하세요.');return}
  const emp=getEmployees().find(e=>e.id===selectedEmpId);
  const dateVal=document.getElementById('addDate').value;
  const typeVal=document.getElementById('addType').value;
  if(!dateVal){alert('날짜를 선택하세요.');return}

  // 주말/공휴일 경고
  const holidayName=isHoliday(dateVal);
  if(isWeekend(dateVal)){
    if(!confirm(dateVal+' 은(는) 주말입니다.\n그래도 등록하시겠습니까?'))return;
  }else if(holidayName){
    if(!confirm(dateVal+' 은(는) '+holidayName+' (법정공휴일)입니다.\n그래도 등록하시겠습니까?'))return;
  }

  const used=loadUsed(selectedEmpId);

  if(typeVal==='생일연차'){
    if(!emp.birthday){alert('해당 직원의 생일이 설정되지 않았습니다.');return}
    const bMonth=parseInt(emp.birthday.split('-')[0],10);
    const selMonth=parseInt(dateVal.split('-')[1],10);
    if(bMonth!==selMonth){alert('생일연차는 생일 당월('+bMonth+'월)에만 사용할 수 있습니다.');return}
    const selYear=dateVal.split('-')[0];
    if(used.some(u=>u.type==='생일연차'&&u.date.startsWith(selYear))){alert(selYear+'년 생일연차는 이미 사용했습니다.');return}
  }

  if(used.find(u=>u.date===dateVal&&u.type===typeVal)){alert('이미 등록된 내역입니다.');return}

  if(typeVal==='연차'&&used.some(u=>u.date===dateVal)){
    if(!confirm(dateVal+'에 이미 반차가 등록되어 있습니다. 연차로 덮어쓰시겠습니까?'))return;
    const f=used.filter(u=>u.date!==dateVal);
    f.push({date:dateVal,type:typeVal});
    f.sort((a,b)=>a.date.localeCompare(b.date));
    saveUsed(selectedEmpId,f);
  }else{
    used.push({date:dateVal,type:typeVal});
    used.sort((a,b)=>a.date.localeCompare(b.date));
    saveUsed(selectedEmpId,used);
  }
  document.getElementById('addDate').value='';
  render();
}

function removeVacation(empId,date,type){
  if(!confirm(date+' '+type+'을(를) 삭제하시겠습니까?'))return;
  const used=loadUsed(empId).filter(u=>!(u.date===date&&u.type===type));
  saveUsed(empId,used);
  render();
}

/* ═══════════════════════════════════════════════
   Export all employees CSV
   ═══════════════════════════════════════════════ */
function exportAllCSV(){
  const today=getToday();
  let csv='\uFEFF성명,부서,입사일,년차,부여,이월,이월종료일,이월소멸,총일수,사용,잔여\n';
  getEmployees().forEach(emp=>{
    const r=calcEmployee(emp);
    const expiryStr=r.carryover>0&&r.carryoverExpiry?fmtISO(new Date(r.carryoverExpiry-86400000)):'';
    csv+=`${emp.name},${emp.dept},${emp.hireDate},${r.yi}년차,${r.yi===1?r.accrued:r.total},${r.carryover},${expiryStr},${r.carryoverExpired||0},${r.totalWithCarry},${numFmt(r.used)},${numFmt(r.remaining)}\n`;
  });
  csv+='\n\n상세 사용 내역\n성명,날짜,구분,차감일수\n';
  getEmployees().forEach(emp=>{
    const used=loadUsed(emp.id);
    used.forEach(u=>{
      csv+=`${emp.name},${u.date},${u.type},${isBirthday(u)?'별도':dayVal(u)}\n`;
    });
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='연차관리_전체_'+fmtISO(today)+'.csv';
  a.click();
}

/* ═══════════════════════════════════════════════
   Employee management (CRUD)
   ═══════════════════════════════════════════════ */
function populateDeptSelect(selectedDept){
  const sel=document.getElementById('empDept');
  const depts=[];
  getEmployees().forEach(e=>{if(e.dept&&!depts.includes(e.dept))depts.push(e.dept)});
  sel.innerHTML=depts.map(d=>`<option value="${d}"${d===selectedDept?' selected':''}>${d}</option>`).join('');
}
function openEmpForm(){
  document.getElementById('empEditId').value='';
  document.getElementById('empName').value='';
  populateDeptSelect('');
  document.getElementById('empHireDate').value='';
  document.getElementById('empBirthday').value='';
  document.getElementById('empMgmtTitle').textContent='직원 등록';
  document.getElementById('empMgmtPanel').style.display='block';
  document.getElementById('empName').focus();
}
function editEmployee(id){
  const emp=getEmployees().find(e=>e.id===id);
  if(!emp)return;
  document.getElementById('empEditId').value=id;
  document.getElementById('empName').value=emp.name;
  populateDeptSelect(emp.dept);
  document.getElementById('empHireDate').value=emp.hireDate;
  document.getElementById('empBirthday').value=emp.birthday||'';
  document.getElementById('empMgmtTitle').textContent='직원 정보 수정 — '+emp.name;
  document.getElementById('empMgmtPanel').style.display='block';
  document.getElementById('empName').focus();
}
function closeEmpForm(){
  document.getElementById('empMgmtPanel').style.display='none';
}
function saveEmployee(){
  const editId=document.getElementById('empEditId').value;
  const name=document.getElementById('empName').value.trim();
  const dept=document.getElementById('empDept').value.trim();
  const hireDate=document.getElementById('empHireDate').value;
  const birthday=document.getElementById('empBirthday').value.trim();
  if(!name){alert('성명을 입력하세요.');return}
  if(!hireDate){alert('입사일을 입력하세요.');return}
  const list=getEmployees();
  if(editId){
    const idx=list.findIndex(e=>e.id===editId);
    if(idx>=0){list[idx]={...list[idx],name,dept,hireDate,birthday}}
  }else{
    const id='emp_'+Date.now();
    list.push({id,name,dept,hireDate,birthday});
  }
  saveEmployees(list);
  // 개별 사원 페이지 localStorage 연동
  syncToEmployeePage(name, {name,dept,hireDate,birthday});
  closeEmpForm();
  render();
}
function syncToEmployeePage(empName, data){
  const key='vac_link_'+empName;
  try{
    const existing=localStorage.getItem(key);
    if(existing){
      const s=JSON.parse(existing);
      s.name=data.name; s.dept=data.dept; s.hireDate=data.hireDate; s.birthday=data.birthday||'';
      localStorage.setItem(key,JSON.stringify(s));
    }else{
      localStorage.setItem(key,JSON.stringify({name:data.name,dept:data.dept,hireDate:data.hireDate,birthday:data.birthday||'',theme:'sage'}));
    }
  }catch(e){}
}
function openLink(id){
  const emp=getEmployees().find(e=>e.id===id);
  if(!emp)return;
  if(!emp.hireDate){alert('입사일을 먼저 설정해주세요.');return}
  const data={name:emp.name,dept:emp.dept,hireDate:emp.hireDate,birthday:emp.birthday||''};
  const token=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const baseUrl=location.href.replace(/\/admin\/?.*$/,'').replace(/\/manage\/?.*$/,'');
  const link=baseUrl+'/?t='+token;
  window.open(link,'_blank');
}

function resignEmployee(id){
  const emp=getEmployees().find(e=>e.id===id);
  if(!emp)return;
  if(!confirm(emp.name+'을(를) 퇴사 처리하시겠습니까?\n해당 직원의 모든 정보가 삭제됩니다.\n이 작업은 되돌릴 수 없습니다.'))return;
  saveEmployees(getEmployees().filter(e=>e.id!==id));
  localStorage.removeItem(storageKey(id));
  // 개별 페이지 데이터도 삭제
  localStorage.removeItem('vac_link_'+emp.name);
  localStorage.removeItem('vac_link_used_'+emp.name);
  if(selectedEmpId===id){selectedEmpId=null;document.getElementById('detailPanel').classList.remove('active')}
  render();
}

  const INIT_VER='v10';
  if(localStorage.getItem('vac_admin_init')!==INIT_VER){
    localStorage.removeItem(EMP_KEY);
    // 사용 내역도 초기화하고 임베디드 데이터로 재설정
    const allKeys=Object.keys(localStorage).filter(k=>k.startsWith('vac_admin_e')||k.startsWith('vac_link_used_'));
    allKeys.forEach(k=>localStorage.removeItem(k));
    localStorage.setItem('vac_admin_init',INIT_VER);
  }
  initDefaultEmployees();
  // 임베디드 사용 내역 초기화
  initUsedData();
  render();
})();
function initUsedData(){
  const emps=getEmployees();
  for(const emp of emps){
    const key=storageKey(emp.id);
    if(!localStorage.getItem(key)){
      const data=EMBEDDED_VACATION_DATA[emp.name]||[];
      if(data.length>0){
        localStorage.setItem(key,JSON.stringify(data));
        // 개별 페이지 키에도 동기화
        localStorage.setItem('vac_link_used_'+emp.name,JSON.stringify(data));
      }
    }
  }
}
